apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: vulcanami
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vulcanami
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      # Disable automount service account token
      automountServiceAccountToken: false
      
      # Pod-level security context
      # IMPORTANT: The official redis:7-alpine image runs as root by default.
      # Forcing UID 1000 may cause permission issues with data directories.
      # RECOMMENDATION FOR PRODUCTION:
      # 1. Build a custom Redis image with a dedicated redis user (UID 999 or similar)
      # 2. Ensure the data volume has correct ownership
      # 3. Test thoroughly before deploying
      # For development/testing with standard image, you may need to disable this or
      # use an initContainer to chown the data directory.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000  # generic non-root user
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: redis
        # Pin to specific version with digest for production
        image: redis:7-alpine
        imagePullPolicy: Always
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        ports:
        - containerPort: 6379
          name: redis
        
        # Container-level security context
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000  # generic non-root user (redis runs as root by default in alpine)
          # Note: readOnlyRootFilesystem not set for redis as it needs write access
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: REDIS_PASSWORD
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: vulcanami
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: redis
