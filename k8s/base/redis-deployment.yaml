apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: vulcanami
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vulcanami
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      # Disable automount service account token
      automountServiceAccountToken: false

      # Pod-level security context
      # IMPORTANT: The official redis:7-alpine image runs as root by default.
      # Using UID 10000+ for enhanced security (CKV_K8S_40).
      # RECOMMENDATION FOR PRODUCTION:
      # 1. Build a custom Redis image with a dedicated redis user (UID 10000 or similar)
      # 2. Ensure the data volume has correct ownership
      # 3. Test thoroughly before deploying
      # For development/testing with standard image, you may need to disable this or
      # use an initContainer to chown the data directory.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000  # High UID for enhanced security
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: redis
          # Pin to specific version with digest for production
          image: redis:7-alpine
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              REDIS_PASSWORD=$(cat /etc/secrets/redis-password)
              redis-server --requirepass "$REDIS_PASSWORD"
          ports:
            - containerPort: 6379
              name: redis

          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10000  # High UID for enhanced security (CKV_K8S_40)
            # Note: readOnlyRootFilesystem not set for redis as it needs write access
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL

          # Use secrets as files instead of environment variables for better security
          volumeMounts:
            - name: redis-storage
              mountPath: /data
            - name: redis-secret
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
        - name: redis-secret
          secret:
            secretName: vulcanami-secrets
            items:
              - key: REDIS_PASSWORD
                path: redis-password
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: vulcanami
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: redis
