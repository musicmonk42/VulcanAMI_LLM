apiVersion: v1
kind: Secret
metadata:
  name: vulcanami-secrets
  namespace: vulcanami
type: Opaque
stringData:
  # IMPORTANT: Replace these with actual secrets in production
  # Use kubectl create secret or external secret management
  JWT_SECRET_KEY: "REPLACE_WITH_ACTUAL_SECRET"
  BOOTSTRAP_KEY: "REPLACE_WITH_ACTUAL_SECRET"
  POSTGRES_PASSWORD: "REPLACE_WITH_ACTUAL_SECRET"
  REDIS_PASSWORD: "REPLACE_WITH_ACTUAL_SECRET"
  # MinIO Credentials (for S3-compatible object storage)
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "REPLACE_WITH_ACTUAL_SECRET"
  MINIO_SECRET_KEY: "REPLACE_WITH_ACTUAL_SECRET"
  # LLM API Keys (REQUIRED for chat features)
  OPENAI_API_KEY: "REPLACE_WITH_ACTUAL_SECRET"
  # Optional: Anthropic API key for Claude models
  ANTHROPIC_API_KEY: ""
  # Optional: Graphix API key
  GRAPHIX_API_KEY: ""
  # Self-improvement LLM key (usually same as OPENAI_API_KEY)
  VULCAN_LLM_API_KEY: "REPLACE_WITH_ACTUAL_SECRET"
  # AWS Credentials for Vulcan Memory System (S3 storage)
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_ACTUAL_SECRET"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_ACTUAL_SECRET"
---
# Instructions for creating secrets:
# kubectl create secret generic vulcanami-secrets \
#   --from-literal=JWT_SECRET_KEY=$(openssl rand -base64 48) \
#   --from-literal=BOOTSTRAP_KEY=$(openssl rand -base64 32) \
#   --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#   --from-literal=REDIS_PASSWORD=$(openssl rand -base64 32) \
#   --from-literal=MINIO_ROOT_USER=minioadmin \
#   --from-literal=MINIO_ROOT_PASSWORD=$(openssl rand -base64 32) \
#   --from-literal=MINIO_SECRET_KEY=$(openssl rand -base64 24) \
#   --from-literal=OPENAI_API_KEY=sk-your-openai-api-key \
#   --from-literal=VULCAN_LLM_API_KEY=sk-your-openai-api-key \
#   --from-literal=AWS_ACCESS_KEY_ID=your-aws-access-key \
#   --from-literal=AWS_SECRET_ACCESS_KEY=your-aws-secret-key \
#   -n vulcanami
#
# Or using a .env file:
# kubectl create secret generic vulcanami-secrets --from-env-file=.env -n vulcanami
