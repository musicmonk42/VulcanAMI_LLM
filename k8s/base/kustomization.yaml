apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami

resources:
  - namespace.yaml
  - secret.yaml
  - api-deployment.yaml
  - api-networkpolicy.yaml
  - ingress.yaml
  - postgres-deployment.yaml
  - postgres-networkpolicy.yaml
  - redis-deployment.yaml
  - redis-networkpolicy.yaml

configMapGenerator:
  - name: vulcanami-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=postgres-service
      - POSTGRES_PORT=5432
      - POSTGRES_DB=vulcanami
      - POSTGRES_USER=vulcanami
      - REDIS_HOST=redis-service
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=http://minio-service:9000
      - MINIO_ACCESS_KEY=minioadmin

labels:
  - pairs:
      app.kubernetes.io/name: vulcanami
      app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    # REQUIRED: Override with specific version during deployment
    # Example: kustomize edit set image ghcr.io/musicmonk42/vulcanami_llm-api:v1.0.0
    # The CI/CD pipeline automatically replaces IMAGE_TAG with the actual version
    newTag: IMAGE_TAG
