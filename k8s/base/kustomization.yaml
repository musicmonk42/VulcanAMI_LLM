apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - pvc.yaml
  - api-deployment.yaml
  - api-networkpolicy.yaml
  - ingress.yaml
  - postgres-deployment.yaml
  - postgres-networkpolicy.yaml
  - redis-deployment.yaml
  - redis-networkpolicy.yaml
  - milvus-deployment.yaml
  - milvus-networkpolicy.yaml
  - minio-deployment.yaml
  - minio-networkpolicy.yaml
  - rbac.yaml

labels:
  - pairs:
      app.kubernetes.io/name: vulcanami
      app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    # REQUIRED: Override with specific version during deployment
    # Example: kustomize edit set image ghcr.io/musicmonk42/vulcanami_llm-api:v1.0.0
    # The CI/CD pipeline automatically replaces IMAGE_TAG with the actual version
    newTag: IMAGE_TAG
