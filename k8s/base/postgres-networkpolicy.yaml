apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-netpol
  namespace: vulcanami
  labels:
    app: postgres
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow ingress from API pods in the same namespace
  - from:
    - podSelector:
        matchLabels:
          app: vulcanami-api
    ports:
    - protocol: TCP
      port: 5432

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow egress to pods in the same namespace (for potential replication)
  # Remove this rule if PostgreSQL doesn't need inter-pod communication
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
