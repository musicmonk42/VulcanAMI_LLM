apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vulcanami-ingress
  namespace: vulcanami
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.vulcanami.example.com
    secretName: vulcanami-tls
  rules:
  - host: api.vulcanami.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vulcanami-api
            port:
              number: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vulcanami-api-hpa
  namespace: vulcanami
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vulcanami-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
