# =============================================================================
# NetworkPolicy Compatibility Matrix
# =============================================================================
# 
# Standard Kubernetes NetworkPolicy (api-networkpolicy.yaml):
#   ✅ Works with: All CNI plugins (Calico, Cilium, Weave, Flannel, etc.)
#   ❌ Limitations: Cannot filter by FQDN, only IP/CIDR
#   ✅ Use for: Development, basic production setups
#
# Cilium NetworkPolicy (this file):
#   ✅ Works with: Cilium CNI only
#   ✅ Features: FQDN filtering, L7 policy, DNS-aware
#   ✅ Use for: Production with Cilium CNI
#
# Calico GlobalNetworkPolicy:
#   ✅ Works with: Calico CNI with eBPF dataplane
#   ✅ Features: FQDN filtering, global policies
#   ✅ Use for: Production with Calico CNI
#
# =============================================================================
# Migration Path
# =============================================================================
#
# 1. Development (No FQDN filtering):
#      kubectl apply -f k8s/base/api-networkpolicy.yaml
#
# 2. Production with Cilium:
#      kubectl apply -f k8s/base/api-networkpolicy-advanced.yaml
#      kubectl delete networkpolicy vulcanami-api-netpol -n vulcanami
#
# 3. Production with Calico:
#      Uncomment Calico section above
#      kubectl apply -f k8s/base/api-networkpolicy-advanced.yaml
#      kubectl delete networkpolicy vulcanami-api-netpol -n vulcanami
#
# 4. Validation:
#      # Test allowed egress
#      kubectl exec -n vulcanami deployment/vulcanami-api -- \
#        curl -I https://api.openai.com
#      
#      # Test blocked egress (should fail)
#      kubectl exec -n vulcanami deployment/vulcanami-api -- \
#        curl -I https://example.com
#
# =============================================================================
