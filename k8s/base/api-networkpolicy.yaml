apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vulcanami-api-netpol
  namespace: vulcanami
  labels:
    app: vulcanami-api
spec:
  podSelector:
    matchLabels:
      app: vulcanami-api
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow ingress from pods in the same namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9148
  
  egress:
  # Allow egress to pods in the same namespace (e.g., postgres, redis)
  - to:
    - podSelector: {}
  
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
  
  # Allow HTTPS/HTTP egress for external API calls (OpenAI, model downloads, etc.)
  # This rule allows traffic to IPs outside the cluster (no selectors = all destinations)
  # For production, consider:
  # 1. Using an egress gateway with allowlisting
  # 2. Restricting to specific CIDR ranges
  # 3. Using DNS-based policies if supported by your CNI
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
