apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vulcanami-api-netpol
  namespace: vulcanami
  labels:
    app: vulcanami-api
spec:
  podSelector:
    matchLabels:
      app: vulcanami-api
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow ingress from pods in the same namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9148

  egress:
  # Allow egress to pods in the same namespace (e.g., postgres, redis, milvus, minio)
  - to:
    - podSelector: {}

  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # ============================================================================
  # EXTERNAL API EGRESS RULES
  # ============================================================================
  # SECURITY: These rules allow HTTPS/HTTP egress for external API calls.
  # 
  # Known external dependencies:
  #   - OpenAI API (api.openai.com)
  #   - Anthropic API (api.anthropic.com)
  #   - HuggingFace (huggingface.co)
  #   - GitHub (github.com, ghcr.io)
  #   - PyPI (pypi.org)
  #   - Model downloads (storage.googleapis.com, s3.amazonaws.com)
  #
  # PRODUCTION HARDENING OPTIONS:
  #
  # Option 1: Egress Gateway with DNS-based allowlisting (Recommended)
  #   - Deploy Istio/Cilium egress gateway
  #   - Configure ServiceEntry with specific FQDNs
  #   - Requires: CNI with DNS policy support
  #
  # Option 2: CIDR-based restrictions
  #   - Lookup IP ranges for known services
  #   - Add 'to.ipBlock.cidr' selectors
  #   - Limitation: IPs can change (requires maintenance)
  #
  # Option 3: External Network Policy Controller
  #   - Use Calico/Cilium Network Policy CRDs
  #   - Support FQDN-based egress rules
  #   - Example:
  #       apiVersion: projectcalico.org/v3
  #       spec:
  #         egress:
  #         - action: Allow
  #           destination:
  #             domains:
  #             - "*.openai.com"
  #             - "*.anthropic.com"
  #
  # Current configuration: Allow all HTTPS/HTTP (suitable for development)
  # For production, implement one of the options above.
  # ============================================================================
  
  - ports:
    - protocol: TCP
      port: 443  # HTTPS for external APIs
    - protocol: TCP
      port: 80   # HTTP for redirects and non-TLS endpoints
    # No 'to' selector = allows traffic to any destination outside the cluster
    # PRODUCTION TODO: Restrict with ipBlock or use DNS-based policies

