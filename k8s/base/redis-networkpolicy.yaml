apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-netpol
  namespace: vulcanami
  labels:
    app: redis
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow ingress from API pods in the same namespace
  - from:
    - podSelector:
        matchLabels:
          app: vulcanami-api
    ports:
    - protocol: TCP
      port: 6379

  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow egress to pods in the same namespace (for potential cluster mode)
  # Remove this rule if Redis doesn't need inter-pod communication
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
