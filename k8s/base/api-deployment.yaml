apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulcanami-api
  namespace: vulcanami
  labels:
    app: vulcanami-api
    component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vulcanami-api
  template:
    metadata:
      labels:
        app: vulcanami-api
        component: api-gateway
    spec:
      # Prevent automatic mounting of the service account token unless explicitly needed
      automountServiceAccountToken: false
      
      # Pod-level security defaults
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001           # matches the 'graphix' user from Dockerfile
        runAsGroup: 1001
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: api
        # NOTE: Replace :latest with a pinned tag or digest for production
        # Example: ghcr.io/musicmonk42/vulcanami_llm-api:v1.0.0
        # or (best): ghcr.io/musicmonk42/vulcanami_llm-api@sha256:<DIGEST>
        image: ghcr.io/musicmonk42/vulcanami_llm-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 9148
          name: metrics
          protocol: TCP
        
        # Container-level security hardening
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        
        # Add volume mounts for writable directories needed by the app
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
        
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: JWT_SECRET_KEY
        - name: BOOTSTRAP_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: BOOTSTRAP_KEY
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: REDIS_PASSWORD
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: MINIO_SECRET_KEY
        envFrom:
        - configMapRef:
            name: vulcanami-config
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      # Volumes for readOnlyRootFilesystem compatibility
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-data
        emptyDir: {}
      
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: vulcanami-api
  namespace: vulcanami
  labels:
    app: vulcanami-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9148
    targetPort: 9148
    protocol: TCP
    name: metrics
  selector:
    app: vulcanami-api
