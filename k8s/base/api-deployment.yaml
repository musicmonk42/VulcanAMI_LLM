apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulcanami-api
  namespace: vulcanami
  labels:
    app: vulcanami-api
    component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vulcanami-api
  template:
    metadata:
      labels:
        app: vulcanami-api
        component: api-gateway
    spec:
      # Prevent automatic mounting of the service account token unless explicitly needed
      automountServiceAccountToken: false

      # Pod-level security defaults
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001           # matches the 'graphix' user from Dockerfile
        runAsGroup: 1001
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault

      # Init container for Milvus bootstrap (creates vector collections if they don't exist)
      initContainers:
      - name: milvus-bootstrap
        image: ghcr.io/musicmonk42/vulcanami_llm-api:v1.0.0
        imagePullPolicy: IfNotPresent
        command:
          - python
          - -m
          - gvulcan.vector.milvus_bootstrap
          - --config
          - /app/configs/vector/milvus/collections.yaml
          - --host
          - milvus-service
          - --port
          - "19530"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        env:
        - name: MILVUS_HOST
          value: "milvus-service"
        - name: MILVUS_PORT
          value: "19530"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi

      containers:
      - name: api
        # Pin to specific version with digest for production
        # Using a stable tag instead of latest
        image: ghcr.io/musicmonk42/vulcanami_llm-api:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 9148
          name: metrics
          protocol: TCP

        # Container-level security hardening
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL

        # Add volume mounts for writable directories needed by the app
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
        - name: memory-store
          mountPath: /app/memory_store
        - name: cache
          mountPath: /tmp/vulcan_cache

        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: JWT_SECRET_KEY
        - name: BOOTSTRAP_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: BOOTSTRAP_KEY
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: REDIS_PASSWORD
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: MINIO_SECRET_KEY
        # AWS credentials for S3 storage
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: AWS_SECRET_ACCESS_KEY
        # LLM API Keys (CRITICAL for chat features)
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: ANTHROPIC_API_KEY
              optional: true
        - name: GRAPHIX_API_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: GRAPHIX_API_KEY
              optional: true
        - name: VULCAN_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vulcanami-secrets
              key: VULCAN_LLM_API_KEY
        envFrom:
        - configMapRef:
            name: vulcanami-config
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        # Using fast health endpoints for quicker probe responses
        # Startup probe: allows up to 5 minutes (30 * 10s) for ML model loading
        # This prevents liveness/readiness probes from killing slow-starting containers
        startupProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3

      # Volumes for readOnlyRootFilesystem compatibility and memory system
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-data
        emptyDir: {}
      - name: memory-store
        persistentVolumeClaim:
          claimName: vulcanami-memory-store
      - name: cache
        persistentVolumeClaim:
          claimName: vulcanami-cache

      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: vulcanami-api
  namespace: vulcanami
  labels:
    app: vulcanami-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9148
    targetPort: 9148
    protocol: TCP
    name: metrics
  selector:
    app: vulcanami-api
