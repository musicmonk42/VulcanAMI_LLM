apiVersion: v1
kind: ConfigMap
metadata:
  name: vulcanami-config
  namespace: vulcanami
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  # Database
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "vulcanami"
  POSTGRES_USER: "vulcanami"
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  # MinIO
  MINIO_ENDPOINT: "http://minio-service:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  # LLM Configuration
  # Note: API keys should be set via Secrets, not ConfigMap
  # The OPENAI_API_KEY should be mounted from vulcanami-secrets
  LLM_OPENAI_MAX_TOKENS: "2000"  # Increased for diagnostic purposes (was 1000)
  # Self-improvement settings (non-sensitive)
  ENABLE_SELF_IMPROVEMENT: "0"  # Set to "1" to enable
  INTRINSIC_DRIVES_ENABLED: "False"
  INTRINSIC_DRIVES_APPROVAL_REQUIRED: "True"
  INTRINSIC_DRIVES_CHECK_INTERVAL: "120"
  INTRINSIC_DRIVES_MAX_COST_SESSION: "2.0"
  INTRINSIC_DRIVES_MAX_COST_DAY: "10.0"
  # CuriosityDriver Configuration (Active Learning Heartbeat)
  CURIOSITY_HEARTBEAT_INTERVAL: "60.0"
  CURIOSITY_MIN_BUDGET: "10.0"
  CURIOSITY_MAX_EXPERIMENTS: "5"
  CURIOSITY_LOW_BUDGET_SLEEP: "120.0"
  CURIOSITY_CYCLE_TIMEOUT: "300.0"
  # Reasoning System Configuration (Singleton Pattern)
  # Enables prewarming of all singletons at startup to prevent
  # progressive query routing degradation (469ms → 152,048ms issue)
  REASONING_PREWARM_SINGLETONS: "true"
  # Memory Guard Configuration
  # Background thread triggers GC when memory exceeds threshold
  MEMORY_GUARD_ENABLED: "true"
  MEMORY_GUARD_THRESHOLD_PERCENT: "85.0"
  MEMORY_GUARD_CHECK_INTERVAL: "5.0"
  # GC Rate Limiting (every N requests instead of every request)
  GC_REQUEST_INTERVAL: "10"
  # Problem Decomposer Configuration
  # Complex queries (complexity >= threshold) use hierarchical decomposition
  PROBLEM_DECOMPOSER_ENABLED: "true"
  DECOMPOSITION_COMPLEXITY_THRESHOLD: "0.40"
  # Semantic Bridge Configuration
  # Enables cross-domain knowledge transfer for multi-tool queries
  SEMANTIC_BRIDGE_ENABLED: "true"
  CROSS_DOMAIN_TRANSFER_ENABLED: "true"
  PATTERN_LEARNING_ENABLED: "true"
  # Performance Tuning Configuration (PR Fixes)
  # Embedding timeout reduced from 30s to 5s to prevent cascade delays
  VULCAN_EMBEDDING_TIMEOUT: "5.0"
  # Decomposition threshold raised to reduce unnecessary decomposition
  VULCAN_DECOMPOSITION_THRESHOLD: "0.70"
  # Arena threshold lowered so more queries go through Arena
  ARENA_COMPLEXITY_THRESHOLD: "0.1"
  # Self-improvement auto-commit disabled by default
  VULCAN_SELF_IMPROVEMENT_AUTO_COMMIT: "false"
  # Gap give-up threshold increased from 3 to 10
  VULCAN_GAP_GIVEUP_THRESHOLD: "10"
  # Semantic Matching Configuration (Performance Optimized)
  # Now safe to enable (default: 0 = enabled) due to Issue #2 and #3 caching fixes
  # Set to 1 to disable for keyword-only routing (faster but less accurate)
  VULCAN_DISABLE_SEMANTIC_MATCHING: "0"
  # Local LLM Configuration (VULCAN is primary brain)
  # ARCHITECTURE: VULCAN reasoning runs first, OpenAI is language fallback only
  # Set to "false" (default) to enable VULCAN as primary brain
  # Set to "true" only if you want to bypass VULCAN entirely (testing/cost control)
  SKIP_LOCAL_LLM: "false"
  # Arena enabled/disabled
  # PERFORMANCE FIX: Set to "false" by default because Arena operations timeout
  # at 30-53 seconds with 66% timeout rate (ISSUE-005), causing cascade failures.
  # Set to "true" only for complex multi-agent tournament scenarios.
  ARENA_ENABLED: "false"
  # Arena timeout in seconds (coordinates with circuit breaker at 45s)
  ARENA_TIMEOUT: "60.0"
  # Query routing timeout in seconds
  # PERFORMANCE FIX: Increased from 10s to 30s to reduce timeout rate.
  # Evidence: ISSUE-003 shows 66-80% of queries timeout at 10s threshold.
  # 30s allows embedding completion while still providing reasonable response times.
  QUERY_ROUTING_TIMEOUT: "30.0"
  # VULCAN Internal LLM Timeout Configuration
  # TIMEOUT FIX: Increased from 15s to 30s per Claude diagnosis
  # 15s was causing timeouts before internal LLM could complete complex reasoning
  VULCAN_LLM_TIMEOUT: "30.0"
  # OpenAI Response Caching Configuration (Performance Optimization)
  # Enables LRU+TTL caching for OpenAI API responses to reduce costs and latency
  OPENAI_CACHE_ENABLED: "true"
  OPENAI_CACHE_MAX_SIZE: "1000"
  OPENAI_CACHE_TTL_SECONDS: "3600"
  # Distillation Storage Async Write Configuration
  # Enables non-blocking writes to reduce request latency
  DISTILLATION_ASYNC_WRITES: "true"
  DISTILLATION_ASYNC_BUFFER_SIZE: "100"
  DISTILLATION_ASYNC_FLUSH_INTERVAL: "5.0"
  # Vulcan Memory System v46 Configuration
  MILVUS_HOST: "milvus-service"
  MILVUS_PORT: "19530"
  S3_BUCKET: "vulcanami-memory"
  AWS_REGION: "us-east-1"
  PACKFILE_SIZE_MB: "32"
  COMPACTION_STRATEGY: "adaptive"
  BLOOM_FILTER: "true"
  INDEX_TYPE: "disk_based_tier_c"
  UNLEARNING_METHOD: "gradient_surgery"
  PROOF_SYSTEM: "groth16"
  MEMORY_STORE_PATH: "/app/memory_store"
  CACHE_ROOT: "/tmp/vulcan_cache"
  CONFIG_PATH: "/app/configs"
  # Learning State Persistence Configuration
  # Path for persisting learning state (tool weights, concepts, contraindications)
  # This ensures learning persists across queries and server restarts
  VULCAN_STORAGE_PATH: "/app/memory_store"
