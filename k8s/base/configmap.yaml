apiVersion: v1
kind: ConfigMap
metadata:
  name: vulcanami-config
  namespace: vulcanami
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  # Database
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "vulcanami"
  POSTGRES_USER: "vulcanami"
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  # MinIO
  MINIO_ENDPOINT: "http://minio-service:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  # LLM Configuration
  # Note: API keys should be set via Secrets, not ConfigMap
  # The OPENAI_API_KEY should be mounted from vulcanami-secrets
  # Self-improvement settings (non-sensitive)
  ENABLE_SELF_IMPROVEMENT: "0"  # Set to "1" to enable
  INTRINSIC_DRIVES_ENABLED: "False"
  INTRINSIC_DRIVES_APPROVAL_REQUIRED: "True"
  INTRINSIC_DRIVES_CHECK_INTERVAL: "120"
  INTRINSIC_DRIVES_MAX_COST_SESSION: "2.0"
  INTRINSIC_DRIVES_MAX_COST_DAY: "10.0"
