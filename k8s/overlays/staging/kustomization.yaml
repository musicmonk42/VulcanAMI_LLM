apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami-staging

resources:
  - ../../base

namePrefix: staging-

labels:
  - pairs:
      environment: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: vulcanami-api

configMapGenerator:
  - name: vulcanami-config
    behavior: merge
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    newTag: main
