apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami-staging

resources:
  - ../../base

namePrefix: staging-

labels:
  - pairs:
      environment: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: vulcanami-api
  # Patch ConfigMap for staging environment
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: vulcanami-config
      data:
        ENVIRONMENT: "staging"
        LOG_LEVEL: "INFO"
    target:
      kind: ConfigMap
      name: vulcanami-config

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    # Override with specific version or commit SHA during deployment
    # Example: kustomize edit set image ghcr.io/musicmonk42/vulcanami_llm-api:main-abc1234
    newTag: IMAGE_TAG
