apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami-development

bases:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: vulcanami-api

configMapGenerator:
  - name: vulcanami-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    newTag: develop
