apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami-development

resources:
  - ../../base

namePrefix: dev-

labels:
  - pairs:
      environment: development

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: vulcanami-api

configMapGenerator:
  - name: vulcanami-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    # Override with specific version or commit SHA during deployment
    # Example: kustomize edit set image ghcr.io/musicmonk42/vulcanami_llm-api:develop-abc1234
    newTag: IMAGE_TAG
