apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami-production

resources:
  - ../../base

namePrefix: prod-

labels:
  - pairs:
      environment: production

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
    target:
      kind: Deployment
      name: vulcanami-api
  # Patch ConfigMap for production environment
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: vulcanami-config
      data:
        ENVIRONMENT: "production"
        LOG_LEVEL: "INFO"
    target:
      kind: ConfigMap
      name: vulcanami-config

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    # REQUIRED: Override with specific version during deployment
    # Example: kustomize edit set image ghcr.io/musicmonk42/vulcanami_llm-api:v1.0.0
    # Use IMAGE_TAG variable from CI/CD pipeline for automated deployments
    newTag: IMAGE_TAG
