apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vulcanami-production

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
    target:
      kind: Deployment
      name: vulcanami-api

configMapGenerator:
  - name: vulcanami-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO

images:
  - name: ghcr.io/musicmonk42/vulcanami_llm-api
    newTag: latest
