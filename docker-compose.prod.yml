################################################################################
# VulcanAMI Production Environment - Docker Compose
# Version: 1.0.0
# Description: Production-ready stack with security hardening
#
# Note: The 'version' attribute is omitted as it's obsolete in Docker Compose v2+
################################################################################

################################################################################
# Networks
################################################################################

networks:
  vulcanami-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

  backend:
    driver: bridge
    internal: true

################################################################################
# Volumes
################################################################################

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  # Vulcan Memory System volumes
  milvus_data:
    driver: local
  etcd_data:
    driver: local
  memory_store_data:
    driver: local

################################################################################
# Services
################################################################################

services:

  ############################################################################
  # Storage Services
  ############################################################################

  postgres:
    image: postgres:14-alpine
    container_name: vulcanami-postgres-prod
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vulcanami}
      - POSTGRES_USER=${POSTGRES_USER:-vulcanami}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vulcanami}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: vulcanami-redis-prod
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  minio:
    image: minio/minio:RELEASE.2025-01-10T00-00-00Z
    container_name: vulcanami-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MINIO_REGION_NAME=us-east-1
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  ############################################################################
  # Vulcan Memory System Services (Milvus Vector Database)
  ############################################################################

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: vulcanami-etcd-prod
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    networks:
      - backend
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: vulcanami-milvus-prod
    restart: always
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: ["milvus", "run", "standalone"]
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  ############################################################################
  # Application Services
  ############################################################################

  # Full Platform (Same as Railway deployment - includes VULCAN chat endpoint)
  # This is the recommended deployment for the complete VulcanAMI experience
  full-platform:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-musicmonk42/vulcanami_llm}:${VERSION:-latest}
    container_name: vulcanami-full-platform-prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - VERSION=${VERSION:-latest}
      - PORT=8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - JWT_SECRET=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - GRAPHIX_JWT_SECRET=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - BOOTSTRAP_KEY=${BOOTSTRAP_KEY:?BOOTSTRAP_KEY is required}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vulcanami}
      - POSTGRES_USER=${POSTGRES_USER:-vulcanami}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # LLM Configuration (REQUIRED for chat features)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GRAPHIX_API_KEY=${GRAPHIX_API_KEY:-}
      - VULCAN_LLM_API_KEY=${VULCAN_LLM_API_KEY:-${OPENAI_API_KEY:-}}
      # Self-improvement configuration
      - ENABLE_SELF_IMPROVEMENT=${ENABLE_SELF_IMPROVEMENT:-0}
      - INTRINSIC_DRIVES_ENABLED=${INTRINSIC_DRIVES_ENABLED:-False}
      - INTRINSIC_DRIVES_APPROVAL_REQUIRED=${INTRINSIC_DRIVES_APPROVAL_REQUIRED:-True}
      # Distillation Configuration (Architectural Fix #6)
      - DISTILLATION_ENABLED=${DISTILLATION_ENABLED:-true}
      - DISTILLATION_MODE=${DISTILLATION_MODE:-active}
      - DISTILLATION_CONFIDENCE_THRESHOLD=${DISTILLATION_CONFIDENCE_THRESHOLD:-0.85}
      - DISTILLATION_ESCALATION_THRESHOLD=${DISTILLATION_ESCALATION_THRESHOLD:-0.40}
      - DISTILLATION_HYBRID_ROUTING=${DISTILLATION_HYBRID_ROUTING:-true}
      # Ray Configuration (Architectural Fix #3)
      - RAY_ENABLED=${RAY_ENABLED:-false}
      - RAY_ADDRESS=${RAY_ADDRESS:-auto}
      # CuriosityDriver Configuration (Active Learning Heartbeat)
      - CURIOSITY_HEARTBEAT_INTERVAL=${CURIOSITY_HEARTBEAT_INTERVAL:-60.0}
      - CURIOSITY_MIN_BUDGET=${CURIOSITY_MIN_BUDGET:-10.0}
      - CURIOSITY_MAX_EXPERIMENTS=${CURIOSITY_MAX_EXPERIMENTS:-5}
      - CURIOSITY_LOW_BUDGET_SLEEP=${CURIOSITY_LOW_BUDGET_SLEEP:-120.0}
      - CURIOSITY_CYCLE_TIMEOUT=${CURIOSITY_CYCLE_TIMEOUT:-300.0}
      # Reasoning System Configuration (Singleton Pattern - Progressive Degradation Fix)
      # Enables prewarming of all singletons at startup to prevent
      # query routing degradation from 469ms to 152,048ms
      - REASONING_PREWARM_SINGLETONS=${REASONING_PREWARM_SINGLETONS:-true}
      # Memory Guard Configuration
      - MEMORY_GUARD_ENABLED=${MEMORY_GUARD_ENABLED:-true}
      - MEMORY_GUARD_THRESHOLD_PERCENT=${MEMORY_GUARD_THRESHOLD_PERCENT:-85.0}
      - MEMORY_GUARD_CHECK_INTERVAL=${MEMORY_GUARD_CHECK_INTERVAL:-5.0}
      # GC Rate Limiting (every N requests instead of every request)
      - GC_REQUEST_INTERVAL=${GC_REQUEST_INTERVAL:-10}
      # Problem Decomposer Configuration
      - PROBLEM_DECOMPOSER_ENABLED=${PROBLEM_DECOMPOSER_ENABLED:-true}
      - DECOMPOSITION_COMPLEXITY_THRESHOLD=${DECOMPOSITION_COMPLEXITY_THRESHOLD:-0.40}
      # Semantic Bridge Configuration
      - SEMANTIC_BRIDGE_ENABLED=${SEMANTIC_BRIDGE_ENABLED:-true}
      - CROSS_DOMAIN_TRANSFER_ENABLED=${CROSS_DOMAIN_TRANSFER_ENABLED:-true}
      - PATTERN_LEARNING_ENABLED=${PATTERN_LEARNING_ENABLED:-true}
      # Performance Tuning Configuration (PR Fixes)
      # Embedding timeout reduced from 30s to 5s to prevent cascade delays
      - VULCAN_EMBEDDING_TIMEOUT=${VULCAN_EMBEDDING_TIMEOUT:-5.0}
      # Decomposition threshold raised to reduce unnecessary decomposition
      - VULCAN_DECOMPOSITION_THRESHOLD=${VULCAN_DECOMPOSITION_THRESHOLD:-0.70}
      # Arena threshold lowered so more queries go through Arena
      - ARENA_COMPLEXITY_THRESHOLD=${ARENA_COMPLEXITY_THRESHOLD:-0.1}
      # Self-improvement auto-commit disabled by default
      - VULCAN_SELF_IMPROVEMENT_AUTO_COMMIT=${VULCAN_SELF_IMPROVEMENT_AUTO_COMMIT:-false}
      # Gap give-up threshold increased from 3 to 10
      - VULCAN_GAP_GIVEUP_THRESHOLD=${VULCAN_GAP_GIVEUP_THRESHOLD:-10}
      # Semantic matching configuration (Performance Optimized)
      # Now safe to enable (default: 0 = enabled) due to Issue #2 and #3 caching fixes
      # Set to 1 to disable for keyword-only routing (faster but less accurate)
      - VULCAN_DISABLE_SEMANTIC_MATCHING=${VULCAN_DISABLE_SEMANTIC_MATCHING:-0}
      # Local LLM Configuration (VULCAN is primary brain)
      # ARCHITECTURE: VULCAN reasoning runs first, OpenAI is language fallback only
      # Set to "false" (default) to enable VULCAN as primary brain
      # Set to "true" only if you want to bypass VULCAN entirely (testing/cost control)
      - SKIP_LOCAL_LLM=${SKIP_LOCAL_LLM:-false}
      # OpenAI Fallback Configuration (SCALABILITY FIX)
      # Controls whether OpenAI fallback is disabled when the internal LLM times out
      # When "false" (default), OpenAI fallback is enabled for when internal LLM fails
      # When "true", OpenAI is disabled even if OPENAI_API_KEY is set
      # For stress tests and production, keep this "false" to ensure fallback availability
      - SKIP_OPENAI=${SKIP_OPENAI:-false}
      # Arena enabled/disabled
      # PERFORMANCE FIX: Set to "false" by default because Arena operations timeout
      # at 30-53 seconds with 66% timeout rate (ISSUE-005), causing cascade failures.
      # Set to "true" only for complex multi-agent tournament scenarios.
      - ARENA_ENABLED=${ARENA_ENABLED:-false}
      # Arena timeout in seconds (coordinates with circuit breaker at 45s)
      - ARENA_TIMEOUT=${ARENA_TIMEOUT:-60.0}
      # Query routing timeout in seconds
      # PERFORMANCE FIX: Increased from 10s to 30s to reduce timeout rate.
      # Evidence: ISSUE-003 shows 66-80% of queries timeout at 10s threshold.
      - QUERY_ROUTING_TIMEOUT=${QUERY_ROUTING_TIMEOUT:-30.0}
      # OpenAI Response Caching Configuration (Performance Optimization)
      # Enables LRU+TTL caching for OpenAI API responses to reduce costs and latency
      - OPENAI_CACHE_ENABLED=${OPENAI_CACHE_ENABLED:-true}
      - OPENAI_CACHE_MAX_SIZE=${OPENAI_CACHE_MAX_SIZE:-1000}
      - OPENAI_CACHE_TTL_SECONDS=${OPENAI_CACHE_TTL_SECONDS:-3600}
      # Distillation Storage Async Write Configuration
      # Enables non-blocking writes to reduce request latency
      - DISTILLATION_ASYNC_WRITES=${DISTILLATION_ASYNC_WRITES:-true}
      - DISTILLATION_ASYNC_BUFFER_SIZE=${DISTILLATION_ASYNC_BUFFER_SIZE:-100}
      - DISTILLATION_ASYNC_FLUSH_INTERVAL=${DISTILLATION_ASYNC_FLUSH_INTERVAL:-5.0}
      # OpenAI Language Formatting Configuration
      # When true, routes ALL natural language output formatting to OpenAI (gpt-4o-mini)
      # This provides fast responses (~2-5s) while VULCAN LLM learns via distillation
      # POLICY: OpenAI ONLY formats VULCAN's reasoning output - no independent reasoning
      - OPENAI_LANGUAGE_FORMATTING=${OPENAI_LANGUAGE_FORMATTING:-true}
      # Legacy polish mode (for backwards compatibility)
      - OPENAI_LANGUAGE_POLISH=${OPENAI_LANGUAGE_POLISH:-false}
      # Hybrid Executor Timeout for parallel LLM execution (seconds)
      # Both local LLM and OpenAI run concurrently; first successful response wins
      - HYBRID_EXECUTOR_TIMEOUT=${HYBRID_EXECUTOR_TIMEOUT:-30.0}
      # Vulcan Memory System (v46) Configuration
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - S3_BUCKET=${S3_BUCKET:-vulcanami-memory}
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - PACKFILE_SIZE_MB=${PACKFILE_SIZE_MB:-32}
      - COMPACTION_STRATEGY=${COMPACTION_STRATEGY:-adaptive}
      - BLOOM_FILTER=${BLOOM_FILTER:-true}
      - INDEX_TYPE=${INDEX_TYPE:-disk_based_tier_c}
      - UNLEARNING_METHOD=${UNLEARNING_METHOD:-gradient_surgery}
      - PROOF_SYSTEM=${PROOF_SYSTEM:-groth16}
      - MEMORY_STORE_PATH=/app/memory_store
      - CACHE_ROOT=/tmp/vulcan_cache
      - CONFIG_PATH=/app/configs
      # Learning State Persistence Configuration
      # Path for persisting learning state (tool weights, concepts, contraindications)
      # This ensures learning persists across queries and server restarts
      - VULCAN_STORAGE_PATH=/app/memory_store
    volumes:
      - memory_store_data:/app/memory_store
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - vulcanami-prod
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # Extended to 5 minutes for ML model loading (BERT, spaCy en_core_web_lg, embeddings)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    profiles:
      - full  # Only starts with: docker compose --profile full up

  # API Gateway (Microservice - for distributed deployments)
  api-gateway:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-musicmonk42/vulcanami_llm}-api:${VERSION:-latest}
    container_name: vulcanami-api-prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - VERSION=${VERSION:-latest}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - BOOTSTRAP_KEY=${BOOTSTRAP_KEY:?BOOTSTRAP_KEY is required}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vulcanami}
      - POSTGRES_USER=${POSTGRES_USER:-vulcanami}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - vulcanami-prod
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # Extended to 5 minutes for ML model loading
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  dqs-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-musicmonk42/vulcanami_llm}-dqs:${VERSION:-latest}
    container_name: vulcanami-dqs-prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - VERSION=${VERSION:-latest}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vulcanami}
      - POSTGRES_USER=${POSTGRES_USER:-vulcanami}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vulcanami-prod
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  pii-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-musicmonk42/vulcanami_llm}-pii:${VERSION:-latest}
    container_name: vulcanami-pii-prod
    restart: always
    environment:
      - ENVIRONMENT=production
      - VERSION=${VERSION:-latest}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vulcanami-prod
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  ############################################################################
  # Monitoring
  ############################################################################

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: vulcanami-prometheus-prod
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=100GB'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus_data:/prometheus
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - vulcanami-prod
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  grafana:
    image: grafana/grafana:10.2.2
    container_name: vulcanami-grafana-prod
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - vulcanami-prod
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  ############################################################################
  # Reverse Proxy (NGINX)
  ############################################################################

  nginx:
    image: nginx:1.27-alpine
    container_name: vulcanami-nginx-prod
    restart: always
    volumes:
      - ./configs/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
    networks:
      - vulcanami-prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

################################################################################
# End of Production Docker Compose Configuration
################################################################################
