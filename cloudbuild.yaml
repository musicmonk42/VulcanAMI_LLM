# =============================================================================
# Google Cloud Build Configuration
# =============================================================================
# This file configures Google Cloud Build to build the VulcanAMI Docker image.
#
# IMPORTANT: The REJECT_INSECURE_JWT build argument is required to acknowledge
# that no insecure JWT secrets are embedded in the Docker image.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Or with Google Cloud Run source-based deployment:
#   gcloud run deploy SERVICE --source . --region REGION
# =============================================================================

steps:
  # Build the Docker image with the required REJECT_INSECURE_JWT argument
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'REJECT_INSECURE_JWT=ack'
      - '-t'
      - '${_IMAGE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_IMAGE_NAME}:latest'
      - '.'
    id: 'build-image'

  # Push the image to the container registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE_NAME}:${SHORT_SHA}'
    id: 'push-sha-tag'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE_NAME}:latest'
    id: 'push-latest-tag'
    waitFor: ['build-image']

# Substitutions (can be overridden at build time)
substitutions:
  _IMAGE_NAME: 'gcr.io/${PROJECT_ID}/vulcanami-llm'

# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Images to be pushed to the registry
images:
  - '${_IMAGE_NAME}:${SHORT_SHA}'
  - '${_IMAGE_NAME}:latest'

# Build timeout (30 minutes)
timeout: '1800s'
