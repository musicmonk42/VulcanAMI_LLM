# Default values for vulcanami.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3

image:
  repository: ghcr.io/musicmonk42/vulcanami_llm-api
  pullPolicy: IfNotPresent
  # SECURITY: Use specific version tag instead of 'latest' for production
  # Example: tag: "v1.0.0" or tag: "1.0.0-sha256:abc123..."
  tag: ""  # REQUIRED: Must be set to a specific version

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  metricsPort: 9148

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "10"  # 10 req/sec per IP for DoS protection
  hosts:
    - host: api.vulcanami.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
   - secretName: vulcanami-tls
     hosts:
       - api.vulcanami.example.com

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Health probes (CRITICAL for production)
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod Disruption Budget (prevents all pods from being terminated during maintenance)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - vulcanami
          topologyKey: kubernetes.io/hostname

# Application configuration
config:
  environment: production
  logLevel: INFO
  pythonUnbuffered: "1"

# Database configuration
postgres:
  enabled: true
  host: postgres-service
  port: 5432
  database: vulcanami
  user: vulcanami
  # Password should be set via secrets

# Redis configuration
redis:
  enabled: true
  host: redis-service
  port: 6379
  # Password should be set via secrets

# MinIO configuration
minio:
  enabled: true
  endpoint: http://minio-service:9000
  # SECURITY: Credentials must be set via external secrets
  # accessKey should reference a secret: accessKeySecretName and accessKeySecretKey
  accessKeySecretName: ""  # REQUIRED: Secret containing MinIO access key
  accessKeySecretKey: "accessKey"  # Key in the secret
  secretKeySecretName: ""  # REQUIRED: Secret containing MinIO secret key
  secretKeySecretKey: "secretKey"  # Key in the secret

# Secrets (REQUIRED: Must be set via --set-string or external secret management)
# Empty values will cause deployment validation to fail
secrets:
  jwtSecretKey: ""  # REQUIRED
  bootstrapKey: ""  # REQUIRED
  postgresPassword: ""  # REQUIRED
  redisPassword: ""  # REQUIRED

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
