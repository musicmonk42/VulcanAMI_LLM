# Default values for vulcanami.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# IMPORTANT: Set to 1 to prevent split-brain race condition when Redis is unavailable.
# Without a working Redis connection for state synchronization, multiple replicas
# will have isolated state and cause oscillating job counts.
# Increase this only after Redis connectivity is confirmed working.
replicaCount: 1

image:
  repository: ghcr.io/musicmonk42/vulcanami_llm-api
  pullPolicy: IfNotPresent
  # SECURITY: Use specific version tag instead of 'latest' for production
  # Example: tag: "v1.0.0" or tag: "1.0.0-sha256:abc123..."
  # This MUST be overridden during deployment with --set image.tag=<version>
  tag: "REPLACE_ME"  # REQUIRED: Must be set to a specific version during deployment

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  metricsPort: 9148

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "10"  # 10 req/sec per IP for DoS protection
  hosts:
    - host: api.vulcanami.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
   - secretName: vulcanami-tls
     hosts:
       - api.vulcanami.example.com

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Health probes (CRITICAL for production)
# Using fast health endpoints for quicker probe responses
# NOTE: initialDelaySeconds must be long enough for ML model loading (~60-90s)
# The application loads BERT, spaCy en_core_web_lg, and embedding models at startup
livenessProbe:
  httpGet:
    path: /health/live
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 3

# Startup probe: allows up to 5 minutes (30 * 10s) for ML model loading
# This prevents liveness/readiness probes from killing slow-starting containers
# The probe succeeds once the /health/live endpoint responds
startupProbe:
  httpGet:
    path: /health/live
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 30

# Pod Disruption Budget (prevents all pods from being terminated during maintenance)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - vulcanami
          topologyKey: kubernetes.io/hostname

# Application configuration
config:
  environment: production
  logLevel: INFO
  pythonUnbuffered: "1"

# LLM Configuration (CRITICAL for chat features)
llm:
  # OpenAI API configuration
  openai:
    enabled: true
    # API key must be set via secrets (see secrets.openaiApiKey)
    model: "gpt-3.5-turbo"
    maxTokens: 2000          # Increased for diagnostic purposes (was 1000)
    temperature: 0.7
    # SKIP_OPENAI: Controls whether OpenAI fallback is disabled
    # When false (default), OpenAI fallback is enabled for stress tests and production
    # When true, OpenAI is disabled even if API key is set
    # This is useful for testing VULCAN without OpenAI dependency
    skipOpenai: false
  # Anthropic API configuration (optional)
  anthropic:
    enabled: false
    # API key must be set via secrets (see secrets.anthropicApiKey)
  # Self-improvement configuration
  selfImprovement:
    enabled: false
    approvalRequired: true
    checkIntervalSeconds: 120
    maxCostPerSession: 2.0
    maxCostPerDay: 10.0
  # GraphixVulcanLLM Configuration (Internal LLM - v2.0.3)
  # CRITICAL FIX: Timeout wrapper prevents silent failures during generation
  graphixVulcan:
    # Generation timeout in seconds (prevents infinite hangs)
    # If generation takes longer than this, TimeoutError is raised
    generationTimeout: 60.0
    # Enable verbose logging for debugging generation issues
    verboseLogging: false

# Distillation Configuration (Architectural Fix #6)
# Enables "Master and Apprentice" pattern for CPU optimization
# Student model handles easy queries, Teacher handles complex ones
distillation:
  enabled: true
  mode: "active"  # "active" (routing enabled) or "passive" (capture only)
  confidenceThreshold: 0.85  # If Student is 85%+ sure, use fast path
  escalationThreshold: 0.40  # If Student is <40% sure, escalate to Teacher
  hybridRouting: true  # Enable Student/Teacher hybrid routing
  fastPathLatencyTargetMs: 50
  teacherTimeoutSeconds: 60
  studentTimeoutSeconds: 5
  captureForTraining: true  # Capture responses for knowledge distillation

# Ray Configuration (Architectural Fix #3)
# Ray Actors manage memory/CPU better than subprocess
# The shared memory volume (/dev/shm) is automatically mounted by the deployment template
ray:
  enabled: false  # Set to true to enable Ray workers
  address: "auto"  # Ray cluster address or "auto" for local
  numCpus: 4
  numGpus: 0
  objectStoreMemory: 2000000000  # 2GB
  # Shared memory size limit for Ray object store
  # Ray recommends at least 30% of available RAM for object store
  # This is automatically mounted at /dev/shm to prevent Ray warnings
  shmSizeLimit: "4Gi"
  # Docker CPU warning suppression (always enabled to clean up logs)
  # Set RAY_DISABLE_DOCKER_CPU_WARNING=1 to suppress CPU detection warnings

# Database configuration
postgres:
  enabled: true
  host: postgres-service
  port: 5432
  database: vulcanami
  user: vulcanami
  # Password should be set via secrets

# Redis configuration
redis:
  enabled: true
  host: redis-service
  port: 6379
  # Password should be set via secrets

# MinIO configuration
minio:
  enabled: true
  endpoint: http://minio-service:9000
  # SECURITY: Credentials must be set via external secrets
  # accessKey should reference a secret: accessKeySecretName and accessKeySecretKey
  accessKeySecretName: ""  # REQUIRED: Secret containing MinIO access key
  accessKeySecretKey: "accessKey"  # Key in the secret
  secretKeySecretName: ""  # REQUIRED: Secret containing MinIO secret key
  secretKeySecretKey: "secretKey"  # Key in the secret

# Vulcan Memory System v46 Configuration
memorySystem:
  enabled: true
  # Milvus vector database configuration
  milvus:
    host: milvus-service
    port: 19530
    # Enable init container to bootstrap collections
    bootstrap:
      enabled: true
      configPath: /configs/vector/milvus/collections.yaml
  # S3/PackfileStore configuration
  s3:
    bucket: vulcanami-memory
    region: us-east-1
    endpointUrl: ""  # Leave empty for AWS S3, or set for MinIO/LocalStack
  # Packfile configuration
  packfile:
    sizeMb: 32
    compression: zstd
    encryption: AES256
  # LSM tree configuration
  lsm:
    compactionStrategy: adaptive
    bloomFilter: true
  # Index configuration
  indexType: disk_based_tier_c
  # Unlearning configuration
  unlearning:
    method: gradient_surgery
    enableVerification: true
  # ZK prover configuration
  zk:
    proofSystem: groth16
  # Persistent storage paths
  paths:
    memoryStore: /app/memory_store
    cacheRoot: /tmp/vulcan_cache
    configPath: /app/configs
  # Learning State Persistence Configuration
  # Persists tool weights, concepts, and contraindications across queries and restarts
  learningPersistence:
    enabled: true
    # File: learning_state.json (stored in memoryStore path)
    filename: learning_state.json

# Persistent Volume Claims for memory system
persistence:
  memoryStore:
    enabled: true
    storageClass: ""  # Uses default storage class if empty
    accessMode: ReadWriteOnce
    size: 50Gi
    # Set to true to keep PVC when helm release is deleted
    retain: true
  cache:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    retain: false

# Secrets (REQUIRED: Must be set via --set-string or external secret management)
# Empty values will cause deployment validation to fail
secrets:
  jwtSecretKey: ""  # REQUIRED
  bootstrapKey: ""  # REQUIRED
  postgresPassword: ""  # REQUIRED
  redisPassword: ""  # REQUIRED
  # LLM API Keys (REQUIRED for chat features)
  openaiApiKey: ""  # REQUIRED for OpenAI chat functionality
  anthropicApiKey: ""  # Optional: For Claude model support
  graphixApiKey: ""  # Optional: For Graphix services
  vulcanLlmApiKey: ""  # Optional: For self-improvement features (defaults to openaiApiKey if not set)
  # AWS Credentials for Memory System (required if using S3)
  awsAccessKeyId: ""  # Optional: For S3 storage
  awsSecretAccessKey: ""  # Optional: For S3 storage

# Security Configuration (Optional - for enhanced security)
# HuggingFace Model Pinning: Pin models to specific commit hashes
# Find revision hashes at: https://huggingface.co/<model-name>/commits/main
security:
  # Model revision pinning (recommended for production)
  modelRevisions:
    textModel: ""  # Optional: VULCAN_TEXT_MODEL_REVISION
    audioModel: ""  # Optional: VULCAN_AUDIO_MODEL_REVISION
    bertModel: ""  # Optional: VULCAN_BERT_MODEL_REVISION
    visionAudioModel: ""  # Optional: VULCAN_VISION_AUDIO_MODEL_REVISION
    adversarialDetector: ""  # Optional: ADVERSARIAL_DETECTOR_REVISION
  
  # Network binding (automatically set to appropriate value in container)
  # Note: Container binding is handled internally; this is for reference only
  bindHost: "0.0.0.0"  # Container environments require 0.0.0.0

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s

# CuriosityDriver Configuration (Active Learning Heartbeat)
# Controls the autonomous curiosity-driven learning system
curiosityDriver:
  enabled: true
  # Interval between heartbeat cycles (seconds)
  heartbeatInterval: 60.0
  # Minimum exploration budget required to run a learning cycle
  minBudgetThreshold: 10.0
  # Maximum experiments to run per learning cycle
  maxExperimentsPerCycle: 5
  # Sleep duration when budget is low (seconds)
  lowBudgetSleep: 120.0
  # Timeout for each learning cycle (seconds)
  cycleTimeout: 300.0

# Reasoning System Configuration (Singleton Pattern)
# Controls reasoning components initialization and behavior
reasoning:
  # Enable singleton prewarming at startup (recommended for production)
  prewarmSingletons: true
  # Enable memory guard for automatic GC when memory exceeds threshold
  memoryGuard:
    enabled: true
    # Memory usage threshold (percent) to trigger GC
    thresholdPercent: 85.0
    # Check interval (seconds)
    checkIntervalSeconds: 5.0
  # GC rate limiting for chat endpoints
  gcRateLimiting:
    # Number of requests between GC triggers
    requestInterval: 10
  # Problem decomposition settings
  problemDecomposer:
    enabled: true
    # Complexity threshold for using decomposition vs direct tool selection
    # Updated to 0.50 to enable decomposition for complex queries (complexity >= 0.50)
    complexityThreshold: 0.50
  # Semantic bridge for cross-domain knowledge transfer
  semanticBridge:
    enabled: true
    # Enable cross-domain transfer for multi-tool queries
    crossDomainTransfer: true
    # Enable pattern learning from successful outcomes
    patternLearning: true
  # REASONING SYSTEM FIX: Direct reasoning result usage
  # When specialized reasoning engines produce high-confidence results,
  # use them directly without OpenAI synthesis (prevents "OpenAI always wins" problem)
  directReasoningResults:
    # Enable using reasoning results directly when confidence is high
    enabled: true
    # Minimum confidence threshold to use reasoning results directly (0.0 to 1.0)
    # Below this threshold, falls back to LLM synthesis
    minConfidenceThreshold: 0.5
  # Self-introspection configuration (world model queries)
  selfIntrospection:
    # Enable world model for self-awareness questions
    enabled: true
    # Bypass safety checks for self-introspection queries
    safetyBypass: true

# Performance Tuning Configuration (PR Fixes)
# These settings were added as part of critical performance fixes
performanceTuning:
  # Embedding timeout for tool selector (seconds)
  # Reduced from 30s to 5s to prevent cascade delays
  embeddingTimeout: 5.0
  # Decomposition threshold set to 0.50 to match code default
  # This enables decomposition for complex queries
  decompositionThreshold: 0.50
  # Arena threshold lowered so more queries go through Arena
  arenaComplexityThreshold: 0.1
  # Self-improvement auto-commit disabled by default
  selfImprovementAutoCommit: false
  # Gap give-up threshold increased from 3 to 10
  gapGiveupThreshold: 10
  # Semantic matching configuration (Performance Optimized)
  # Now safe to enable (default: false = enabled) due to Issue #2 and #3 caching fixes
  # Set to true to disable for keyword-only routing (faster but less accurate)
  disableSemanticMatching: false
  # ARCHITECTURE: VULCAN is the primary brain (VULCAN reasoning first)
  # VULCAN reasoning runs first, OpenAI is ONLY for language generation fallback
  # Default is false to enable VULCAN as primary brain for all reasoning
  # Set to true ONLY if you want to bypass VULCAN entirely (testing/cost control)
  skipLocalLlm: false
  # PERFORMANCE FIX: Arena disabled by default (ISSUE-005)
  # Arena operations timeout at 30-53s with 66% timeout rate, causing cascade failures
  # Default changed to false to reduce response time from 37-73s to 5-10s
  # Set to true only for complex multi-agent tournament scenarios
  arenaEnabled: false
  # Arena timeout in seconds (default: 60s, coordinates with circuit breaker at 45s)
  arenaTimeout: 60.0
  # PERFORMANCE FIX: Query routing timeout increased (ISSUE-003)
  # 10s timeout caused 66-80% timeout rate; 30s allows embedding completion
  queryRoutingTimeout: 30.0
  # VULCAN Internal LLM Timeout (TIMEOUT FIX per Claude diagnosis)
  # Increased from 15s to 30s to allow complex reasoning to complete
  vulcanLlmTimeout: 30.0
  # VULCAN Hard Timeout for LLM operations (seconds)
  # CPU CLOUD FIX: Increased from 120s to 300s (5 minutes) to prevent timeout
  # At ~500ms per token, 300s allows ~600 tokens before timeout
  vulcanLlmHardTimeout: 300.0
  # VULCAN Per-Token Timeout for CPU execution (seconds)
  # Internal LLM can take 500ms+ per token on CPU
  vulcanLlmPerTokenTimeout: 30.0
  # VULCAN CPU Max Tokens limit (prevents timeout on CPU-only instances)
  # CPU CLOUD FIX: Limits max_tokens to 50 to ensure completion within timeout
  # At ~500ms per token, 50 tokens takes ~25 seconds
  vulcanCpuMaxTokens: 50
  # Minimum agents in the agent pool (reduced for CPU optimization)
  # CPU CLOUD FIX: Reduced from 5 to 2 to reduce context-switching overhead
  minAgents: 2
  # ADAPTIVE TIMEOUT CONFIGURATION (Task 4 Fix)
  # Base timeout for adaptive timeout calculation (seconds)
  # Formula: timeout = baseTimeout + (max_tokens * timeoutPerToken)
  adaptiveTimeoutBase: 5.0
  # Per-token timeout for adaptive calculation (seconds)
  adaptiveTimeoutPerToken: 2.0
  # ZMQ BUFFER CONFIGURATION (Resource Starvation Fix)
  # Connection timeout for ZMQ task queues (milliseconds)
  # Increased from 30000ms to 120000ms to prevent Resource Starvation
  # when transformer inference causes 1.1-3.9s/token latency
  # At 30-100 tokens per response, this allows reasoning to complete
  zmqConnectionTimeout: 120000
  # Tool monitor enabled (default: true)
  # Set to false to disable tool monitoring for resource-constrained environments
  toolMonitorEnabled: true

# Hybrid Output Configuration (VULCAN reasoning + OpenAI formatting)
# Implements the hybrid output pattern where VULCAN does all reasoning,
# and OpenAI is used only for prose formatting (not reasoning)
hybridOutput:
  # Enable OpenAI for ALL output formatting (not reasoning)
  # When true, OpenAI (gpt-4o-mini) converts VULCAN's structured output to natural language
  # This bypasses the slow internal LLM for prose generation (2-5s vs 30s+)
  # POLICY: OpenAI MUST NOT reason - only format VULCAN's completed reasoning
  # Every response is captured for distillation so VULCAN LLM learns over time
  openaiLanguageFormatting: true
  # Legacy polish mode (polishes internal LLM output, not replacement)
  openaiLanguagePolish: false
  # Maximum tokens for formatting (shorter than reasoning)
  formattingMaxTokens: 500
  # Temperature for formatting (low for consistent output)
  formattingTemperature: 0.3

# Hybrid Executor Configuration (Parallel LLM Execution)
# Controls how VULCAN's HybridLLMExecutor runs local and OpenAI backends
hybridExecutor:
  # Timeout for parallel execution in seconds
  # Both local LLM and OpenAI run concurrently; first successful response wins
  # Pending tasks are cancelled after timeout
  timeout: 30.0
  # Note: Grace period before cancelling local task when OpenAI finishes first
  # This allows VULCAN's local reasoning to complete even if slower than OpenAI
  # Ensures VULCAN reasoning is preferred over OpenAI fallback
  localGracePeriodSeconds: 2.0

# OpenAI Response Caching Configuration
# Enables LRU+TTL caching for OpenAI API responses to reduce costs and latency
openaiCache:
  enabled: true
  # Maximum number of cached responses (LRU eviction when exceeded)
  maxSize: 1000
  # Time-to-live for cached responses in seconds (1 hour default)
  ttlSeconds: 3600

# Distillation Async Storage Configuration
# Enables non-blocking writes to reduce request latency during ensemble mode
distillationStorage:
  asyncWritesEnabled: true
  # Buffer size for async writes (flushes when full)
  asyncBufferSize: 100
  # Flush interval for async writes in seconds
  asyncFlushIntervalSeconds: 5.0
