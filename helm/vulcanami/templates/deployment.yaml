apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vulcanami.fullname" . }}
  labels:
    {{- include "vulcanami.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vulcanami.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vulcanami.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vulcanami.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.memorySystem.enabled .Values.memorySystem.milvus.bootstrap.enabled }}
      initContainers:
      - name: milvus-bootstrap
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - python
          - -m
          - gvulcan.vector.milvus_bootstrap
          - --config
          - {{ .Values.memorySystem.milvus.bootstrap.configPath }}
          - --host
          - {{ .Values.memorySystem.milvus.host }}
          - --port
          - "{{ .Values.memorySystem.milvus.port }}"
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: configs
          mountPath: /configs
          readOnly: true
        env:
        - name: MILVUS_HOST
          value: {{ .Values.memorySystem.milvus.host | quote }}
        - name: MILVUS_PORT
          value: {{ .Values.memorySystem.milvus.port | quote }}
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.service.metricsPort }}
          protocol: TCP
        {{- if .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        {{- end }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: jwtSecretKey
        - name: BOOTSTRAP_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: bootstrapKey
        {{- if .Values.postgres.enabled }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: postgresPassword
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: redisPassword
        - name: REDIS_HOST
          value: {{ .Values.redis.host | quote }}
        - name: REDIS_PORT
          value: {{ .Values.redis.port | quote }}
        {{- end }}
        {{- if .Values.minio.enabled }}
        - name: MINIO_ENDPOINT
          value: {{ .Values.minio.endpoint | quote }}
        {{- end }}
        {{- with .Values.config }}
        - name: ENVIRONMENT
          value: {{ .environment | quote }}
        - name: LOG_LEVEL
          value: {{ .logLevel | quote }}
        - name: PYTHON_UNBUFFERED
          value: {{ .pythonUnbuffered | quote }}
        {{- end }}
        {{- if .Values.security }}
        {{- if .Values.security.modelRevisions }}
        {{- if .Values.security.modelRevisions.textModel }}
        - name: VULCAN_TEXT_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.textModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.audioModel }}
        - name: VULCAN_AUDIO_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.audioModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.bertModel }}
        - name: VULCAN_BERT_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.bertModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.visionAudioModel }}
        - name: VULCAN_VISION_AUDIO_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.visionAudioModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.adversarialDetector }}
        - name: ADVERSARIAL_DETECTOR_REVISION
          value: {{ .Values.security.modelRevisions.adversarialDetector | quote }}
        {{- end }}
        {{- end }}
        - name: HOST
          value: {{ .Values.security.bindHost | default "0.0.0.0" | quote }}
        - name: API_HOST
          value: {{ .Values.security.bindHost | default "0.0.0.0" | quote }}
        {{- end }}
        {{- /* Distillation Configuration (Architectural Fix #6) */}}
        {{- if .Values.distillation }}
        - name: DISTILLATION_ENABLED
          value: {{ .Values.distillation.enabled | quote }}
        - name: DISTILLATION_MODE
          value: {{ .Values.distillation.mode | quote }}
        - name: DISTILLATION_CONFIDENCE_THRESHOLD
          value: {{ .Values.distillation.confidenceThreshold | quote }}
        - name: DISTILLATION_ESCALATION_THRESHOLD
          value: {{ .Values.distillation.escalationThreshold | quote }}
        - name: DISTILLATION_HYBRID_ROUTING
          value: {{ .Values.distillation.hybridRouting | quote }}
        {{- end }}
        {{- /* Ray Configuration (Architectural Fix #3) */}}
        {{- if .Values.ray }}
        {{- if .Values.ray.enabled }}
        - name: RAY_ENABLED
          value: "true"
        - name: RAY_ADDRESS
          value: {{ .Values.ray.address | quote }}
        - name: RAY_NUM_CPUS
          value: {{ .Values.ray.numCpus | quote }}
        - name: RAY_NUM_GPUS
          value: {{ .Values.ray.numGpus | quote }}
        - name: RAY_OBJECT_STORE_MEMORY
          value: {{ .Values.ray.objectStoreMemory | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.memorySystem.enabled }}
        # Vulcan Memory System v46 AWS credentials
        {{- if .Values.secrets.awsAccessKeyId }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: awsAccessKeyId
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: awsSecretAccessKey
        {{- end }}
        # Vulcan Memory System v46 environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: {{ include "vulcanami.fullname" . }}-memory-config
        {{- end }}
        # Volumes for readOnlyRootFilesystem compatibility
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
        {{- if .Values.memorySystem.enabled }}
        - name: configs
          mountPath: /configs
          readOnly: true
        {{- if .Values.persistence.memoryStore.enabled }}
        - name: memory-store
          mountPath: {{ .Values.memorySystem.paths.memoryStore }}
        {{- end }}
        {{- if .Values.persistence.cache.enabled }}
        - name: cache
          mountPath: {{ .Values.memorySystem.paths.cacheRoot }}
        {{- end }}
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-data
        emptyDir: {}
      {{- if .Values.memorySystem.enabled }}
      - name: configs
        configMap:
          name: {{ include "vulcanami.fullname" . }}-memory-config
      {{- if .Values.persistence.memoryStore.enabled }}
      - name: memory-store
        persistentVolumeClaim:
          claimName: {{ include "vulcanami.fullname" . }}-memory-store
      {{- end }}
      {{- if .Values.persistence.cache.enabled }}
      - name: cache
        persistentVolumeClaim:
          claimName: {{ include "vulcanami.fullname" . }}-cache
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
