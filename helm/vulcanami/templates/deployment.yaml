apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vulcanami.fullname" . }}
  labels:
    {{- include "vulcanami.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vulcanami.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vulcanami.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vulcanami.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.memorySystem.enabled .Values.memorySystem.milvus.bootstrap.enabled }}
      initContainers:
      - name: milvus-bootstrap
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - python
          - -m
          - gvulcan.vector.milvus_bootstrap
          - --config
          - {{ .Values.memorySystem.milvus.bootstrap.configPath }}
          - --host
          - {{ .Values.memorySystem.milvus.host }}
          - --port
          - "{{ .Values.memorySystem.milvus.port }}"
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: configs
          mountPath: /configs
          readOnly: true
        env:
        - name: MILVUS_HOST
          value: {{ .Values.memorySystem.milvus.host | quote }}
        - name: MILVUS_PORT
          value: {{ .Values.memorySystem.milvus.port | quote }}
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.service.metricsPort }}
          protocol: TCP
        {{- if .Values.startupProbe }}
        startupProbe:
          {{- toYaml .Values.startupProbe | nindent 12 }}
        {{- end }}
        {{- if .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        {{- end }}
        {{- if .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: jwtSecretKey
        - name: BOOTSTRAP_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: bootstrapKey
        {{- if .Values.postgres.enabled }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: postgresPassword
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: redisPassword
        - name: REDIS_HOST
          value: {{ .Values.redis.host | quote }}
        - name: REDIS_PORT
          value: {{ .Values.redis.port | quote }}
        {{- end }}
        {{- if .Values.minio.enabled }}
        - name: MINIO_ENDPOINT
          value: {{ .Values.minio.endpoint | quote }}
        {{- end }}
        {{- with .Values.config }}
        - name: ENVIRONMENT
          value: {{ .environment | quote }}
        - name: LOG_LEVEL
          value: {{ .logLevel | quote }}
        - name: PYTHON_UNBUFFERED
          value: {{ .pythonUnbuffered | quote }}
        {{- end }}
        {{- if .Values.security }}
        {{- if .Values.security.modelRevisions }}
        {{- if .Values.security.modelRevisions.textModel }}
        - name: VULCAN_TEXT_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.textModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.audioModel }}
        - name: VULCAN_AUDIO_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.audioModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.bertModel }}
        - name: VULCAN_BERT_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.bertModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.visionAudioModel }}
        - name: VULCAN_VISION_AUDIO_MODEL_REVISION
          value: {{ .Values.security.modelRevisions.visionAudioModel | quote }}
        {{- end }}
        {{- if .Values.security.modelRevisions.adversarialDetector }}
        - name: ADVERSARIAL_DETECTOR_REVISION
          value: {{ .Values.security.modelRevisions.adversarialDetector | quote }}
        {{- end }}
        {{- end }}
        - name: HOST
          value: {{ .Values.security.bindHost | default "0.0.0.0" | quote }}
        - name: API_HOST
          value: {{ .Values.security.bindHost | default "0.0.0.0" | quote }}
        {{- end }}
        {{- /* Distillation Configuration (Architectural Fix #6) */}}
        {{- if .Values.distillation }}
        - name: DISTILLATION_ENABLED
          value: {{ .Values.distillation.enabled | quote }}
        - name: DISTILLATION_MODE
          value: {{ .Values.distillation.mode | quote }}
        - name: DISTILLATION_CONFIDENCE_THRESHOLD
          value: {{ .Values.distillation.confidenceThreshold | quote }}
        - name: DISTILLATION_ESCALATION_THRESHOLD
          value: {{ .Values.distillation.escalationThreshold | quote }}
        - name: DISTILLATION_HYBRID_ROUTING
          value: {{ .Values.distillation.hybridRouting | quote }}
        {{- end }}
        {{- /* Ray Configuration (Architectural Fix #3) */}}
        {{- if .Values.ray }}
        {{- if .Values.ray.enabled }}
        - name: RAY_ENABLED
          value: "true"
        - name: RAY_ADDRESS
          value: {{ .Values.ray.address | quote }}
        - name: RAY_NUM_CPUS
          value: {{ .Values.ray.numCpus | quote }}
        - name: RAY_NUM_GPUS
          value: {{ .Values.ray.numGpus | quote }}
        - name: RAY_OBJECT_STORE_MEMORY
          value: {{ .Values.ray.objectStoreMemory | quote }}
        {{- end }}
        {{- end }}
        {{- /* CuriosityDriver Configuration (Active Learning Heartbeat) */}}
        {{- if .Values.curiosityDriver }}
        {{- if .Values.curiosityDriver.enabled }}
        - name: CURIOSITY_HEARTBEAT_INTERVAL
          value: {{ .Values.curiosityDriver.heartbeatInterval | quote }}
        - name: CURIOSITY_MIN_BUDGET
          value: {{ .Values.curiosityDriver.minBudgetThreshold | quote }}
        - name: CURIOSITY_MAX_EXPERIMENTS
          value: {{ .Values.curiosityDriver.maxExperimentsPerCycle | quote }}
        - name: CURIOSITY_LOW_BUDGET_SLEEP
          value: {{ .Values.curiosityDriver.lowBudgetSleep | quote }}
        - name: CURIOSITY_CYCLE_TIMEOUT
          value: {{ .Values.curiosityDriver.cycleTimeout | quote }}
        {{- end }}
        {{- end }}
        {{- /* Reasoning System Configuration (Singleton Pattern) */}}
        {{- if .Values.reasoning }}
        - name: REASONING_PREWARM_SINGLETONS
          value: {{ .Values.reasoning.prewarmSingletons | quote }}
        {{- if .Values.reasoning.memoryGuard }}
        {{- if .Values.reasoning.memoryGuard.enabled }}
        - name: MEMORY_GUARD_ENABLED
          value: "true"
        - name: MEMORY_GUARD_THRESHOLD_PERCENT
          value: {{ .Values.reasoning.memoryGuard.thresholdPercent | quote }}
        - name: MEMORY_GUARD_CHECK_INTERVAL
          value: {{ .Values.reasoning.memoryGuard.checkIntervalSeconds | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.reasoning.gcRateLimiting }}
        - name: GC_REQUEST_INTERVAL
          value: {{ .Values.reasoning.gcRateLimiting.requestInterval | quote }}
        {{- end }}
        {{- if .Values.reasoning.problemDecomposer }}
        {{- if .Values.reasoning.problemDecomposer.enabled }}
        - name: PROBLEM_DECOMPOSER_ENABLED
          value: "true"
        - name: DECOMPOSITION_COMPLEXITY_THRESHOLD
          value: {{ .Values.reasoning.problemDecomposer.complexityThreshold | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.reasoning.semanticBridge }}
        {{- if .Values.reasoning.semanticBridge.enabled }}
        - name: SEMANTIC_BRIDGE_ENABLED
          value: "true"
        - name: CROSS_DOMAIN_TRANSFER_ENABLED
          value: {{ .Values.reasoning.semanticBridge.crossDomainTransfer | quote }}
        - name: PATTERN_LEARNING_ENABLED
          value: {{ .Values.reasoning.semanticBridge.patternLearning | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- /* Performance Tuning Configuration (PR Fixes) */}}
        {{- if .Values.performanceTuning }}
        - name: VULCAN_EMBEDDING_TIMEOUT
          value: {{ .Values.performanceTuning.embeddingTimeout | quote }}
        - name: VULCAN_DECOMPOSITION_THRESHOLD
          value: {{ .Values.performanceTuning.decompositionThreshold | quote }}
        - name: ARENA_COMPLEXITY_THRESHOLD
          value: {{ .Values.performanceTuning.arenaComplexityThreshold | quote }}
        - name: VULCAN_SELF_IMPROVEMENT_AUTO_COMMIT
          value: {{ .Values.performanceTuning.selfImprovementAutoCommit | quote }}
        - name: VULCAN_GAP_GIVEUP_THRESHOLD
          value: {{ .Values.performanceTuning.gapGiveupThreshold | quote }}
        {{- /* Semantic Matching Configuration (EMERGENCY FIX for Embedding Bottleneck) */}}
        {{- if .Values.performanceTuning.disableSemanticMatching }}
        - name: VULCAN_DISABLE_SEMANTIC_MATCHING
          value: "1"
        {{- else }}
        - name: VULCAN_DISABLE_SEMANTIC_MATCHING
          value: "0"
        {{- end }}
        {{- /* Local LLM Configuration (VULCAN is primary brain) */}}
        {{- /* ARCHITECTURE: VULCAN reasoning runs first, OpenAI is language fallback only */}}
        {{- /* Set skipLocalLlm: true only to bypass VULCAN entirely (testing/cost control) */}}
        - name: SKIP_LOCAL_LLM
          value: {{ .Values.performanceTuning.skipLocalLlm | default false | quote }}
        {{- /* Arena Configuration (Performance Tuning) */}}
        - name: ARENA_ENABLED
          value: {{ .Values.performanceTuning.arenaEnabled | quote }}
        - name: ARENA_TIMEOUT
          value: {{ .Values.performanceTuning.arenaTimeout | quote }}
        - name: QUERY_ROUTING_TIMEOUT
          value: {{ .Values.performanceTuning.queryRoutingTimeout | quote }}
        {{- /* VULCAN LLM Timeout Configuration (TIMEOUT FIX per Claude diagnosis) */}}
        - name: VULCAN_LLM_TIMEOUT
          value: {{ .Values.performanceTuning.vulcanLlmTimeout | default 30.0 | quote }}
        {{- /* VULCAN Hard Timeout for CPU-intensive reasoning */}}
        {{- /* CPU CLOUD FIX: Increased default from 120s to 300s */}}
        - name: VULCAN_LLM_HARD_TIMEOUT
          value: {{ .Values.performanceTuning.vulcanLlmHardTimeout | default 300.0 | quote }}
        {{- /* VULCAN Per-Token Timeout for CPU execution */}}
        - name: VULCAN_LLM_PER_TOKEN_TIMEOUT
          value: {{ .Values.performanceTuning.vulcanLlmPerTokenTimeout | default 30.0 | quote }}
        {{- /* VULCAN CPU Max Tokens limit for CPU-only instances */}}
        {{- /* CPU CLOUD FIX: Limits max_tokens to prevent timeout */}}
        - name: VULCAN_CPU_MAX_TOKENS
          value: {{ .Values.performanceTuning.vulcanCpuMaxTokens | default 50 | quote }}
        {{- /* Minimum agents in agent pool (CPU optimization) */}}
        {{- /* CPU CLOUD FIX: Reduced from 5 to 2 to reduce context-switching overhead */}}
        - name: MIN_AGENTS
          value: {{ .Values.performanceTuning.minAgents | default 2 | quote }}
        {{- /* ADAPTIVE TIMEOUT CONFIGURATION (Task 4 Fix) */}}
        {{- /* Formula: timeout = baseTimeout + (max_tokens * timeoutPerToken) */}}
        - name: VULCAN_BASE_TIMEOUT
          value: {{ .Values.performanceTuning.adaptiveTimeoutBase | default 5.0 | quote }}
        - name: VULCAN_TIMEOUT_PER_TOKEN
          value: {{ .Values.performanceTuning.adaptiveTimeoutPerToken | default 2.0 | quote }}
        {{- /* ZMQ BUFFER CONFIGURATION (Task 3 Fix) */}}
        {{- /* Prevents Orchestrator Panic during CPU-bound inference */}}
        - name: ZMQ_CONNECTION_TIMEOUT
          value: {{ .Values.performanceTuning.zmqConnectionTimeout | default 30000 | quote }}
        {{- end }}
        {{- if .Values.hybridExecutor }}
        {{- /* Hybrid Executor Configuration (BUG #5 FIX: Parallel LLM Execution) */}}
        - name: HYBRID_EXECUTOR_TIMEOUT
          value: {{ .Values.hybridExecutor.timeout | default 30.0 | quote }}
        {{- /* BUG #5 FIX: Grace period before cancelling local VULCAN task when OpenAI finishes first */}}
        - name: VULCAN_LOCAL_GRACE_PERIOD
          value: {{ .Values.hybridExecutor.localGracePeriodSeconds | default 2.0 | quote }}
        {{- end }}
        {{- if .Values.hybridOutput }}
        {{- /* Hybrid Output Configuration (OpenAI for formatting only) */}}
        {{- /* OPENAI_LANGUAGE_FORMATTING: Route ALL output formatting to OpenAI (fast path) */}}
        - name: OPENAI_LANGUAGE_FORMATTING
          value: {{ .Values.hybridOutput.openaiLanguageFormatting | default true | quote }}
        {{- /* OPENAI_LANGUAGE_POLISH: Legacy polish mode (polishes internal LLM output) */}}
        - name: OPENAI_LANGUAGE_POLISH
          value: {{ .Values.hybridOutput.openaiLanguagePolish | default false | quote }}
        {{- end }}
        {{- /* SKIP_OPENAI: Controls whether OpenAI fallback is disabled */}}
        {{- /* When false (default), OpenAI fallback is enabled */}}
        {{- /* When true, OpenAI is disabled even if API key is set */}}
        {{- if .Values.llm }}
        {{- if .Values.llm.openai }}
        - name: SKIP_OPENAI
          value: {{ .Values.llm.openai.skipOpenai | default false | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.memorySystem.enabled }}
        # Vulcan Memory System v46 AWS credentials
        {{- if .Values.secrets.awsAccessKeyId }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: awsAccessKeyId
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "vulcanami.fullname" . }}-secrets
              key: awsSecretAccessKey
        {{- end }}
        # Vulcan Memory System v46 environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: {{ include "vulcanami.fullname" . }}-memory-config
        {{- end }}
        # Volumes for readOnlyRootFilesystem compatibility
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
        {{- if .Values.memorySystem.enabled }}
        - name: configs
          mountPath: /configs
          readOnly: true
        {{- if .Values.persistence.memoryStore.enabled }}
        - name: memory-store
          mountPath: {{ .Values.memorySystem.paths.memoryStore }}
        {{- end }}
        {{- if .Values.persistence.cache.enabled }}
        - name: cache
          mountPath: {{ .Values.memorySystem.paths.cacheRoot }}
        {{- end }}
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-data
        emptyDir: {}
      {{- if .Values.memorySystem.enabled }}
      - name: configs
        configMap:
          name: {{ include "vulcanami.fullname" . }}-memory-config
      {{- if .Values.persistence.memoryStore.enabled }}
      - name: memory-store
        persistentVolumeClaim:
          claimName: {{ include "vulcanami.fullname" . }}-memory-store
      {{- end }}
      {{- if .Values.persistence.cache.enabled }}
      - name: cache
        persistentVolumeClaim:
          claimName: {{ include "vulcanami.fullname" . }}-cache
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
