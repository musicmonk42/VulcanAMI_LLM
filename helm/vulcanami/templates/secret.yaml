apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vulcanami.fullname" . }}-secrets
  labels:
    {{- include "vulcanami.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.jwtSecretKey }}
  jwtSecretKey: {{ .Values.secrets.jwtSecretKey | b64enc | quote }}
  {{- else }}
  {{- fail "secrets.jwtSecretKey is required" }}
  {{- end }}
  {{- if .Values.secrets.bootstrapKey }}
  bootstrapKey: {{ .Values.secrets.bootstrapKey | b64enc | quote }}
  {{- else }}
  {{- fail "secrets.bootstrapKey is required" }}
  {{- end }}
  {{- if .Values.secrets.postgresPassword }}
  postgresPassword: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  {{- else }}
  {{- fail "secrets.postgresPassword is required" }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  redisPassword: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- else }}
  {{- fail "secrets.redisPassword is required" }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  openaiApiKey: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  anthropicApiKey: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.graphixApiKey }}
  graphixApiKey: {{ .Values.secrets.graphixApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.vulcanLlmApiKey }}
  vulcanLlmApiKey: {{ .Values.secrets.vulcanLlmApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.awsAccessKeyId }}
  awsAccessKeyId: {{ .Values.secrets.awsAccessKeyId | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.awsSecretAccessKey }}
  awsSecretAccessKey: {{ .Values.secrets.awsSecretAccessKey | b64enc | quote }}
  {{- end }}
