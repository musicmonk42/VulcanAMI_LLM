# ==============================================================================
# UNLEARNING VERIFICATION CIRCUIT SPECIFICATION - SECURITY FIXED VERSION
# ==============================================================================
# Version: 1.0.1
# Last Updated: 2025-11-15
# Circuit Type: Groth16 zkSNARK
# Security Level: 128-bit
# Status: Security Issues Fixed
# ==============================================================================

circuit_metadata:
  name: "Unlearning Verification Circuit - Security Fixed"
  version: "1.0.1"
  circuit_type: "Groth16"
  security_level: 128
  curve: "bn128"
  field_size: 254
  last_updated: "2025-11-15"
  author: "Vulcan LLM Team"
  license: "Proprietary"
  security_fixes:
    - "Added constraints to 15 previously unconstrained signals"
    - "Implemented safe division with zero-divisor checks"
    - "Added nullifier generation for replay protection"
    - "Enhanced randomness validation for blinding factors"
    - "Fixed private input count discrepancy"
    - "Added overflow protection for arithmetic operations"

# ==============================================================================
# CIRCUIT PARAMETERS
# ==============================================================================

parameters:
  embedding_dimension: 1536
  num_embeddings: 256
  merkle_tree_depth: 20
  model_param_size: 128
  max_documents: 1048576  # 2^20
  batch_size: 256
  
  # Constraint counts (updated after fixes)
  total_constraints: 15734120  # ~15.73M (slight increase due to safety checks)
  public_inputs: 17
  private_inputs: 395008  # Corrected count with nullifier secrets
  
  # Compilation parameters
  circom_version: "2.1.8"
  snarkjs_version: "0.7.0"
  optimization_level: 2
  
  # Proving parameters
  proof_generation_time_target: "30s"
  verification_time_target: "5ms"
  proof_size: 256  # bytes
  
  # Memory requirements
  witness_generation_memory: "32GB"
  proving_memory: "64GB"
  verification_memory: "1MB"

# ==============================================================================
# PUBLIC INPUTS (17 signals)
# ==============================================================================

public_inputs:
  - name: "requestId"
    type: "field"
    bits: 254
    description: "Unique identifier for unlearning request"
    
  - name: "timestamp"
    type: "field"
    bits: 64
    description: "Unix timestamp of unlearning operation"
    validation: "Must be between 2021 and 2030"
    
  - name: "versionBefore"
    type: "field"
    bits: 32
    description: "Model version before unlearning"
    
  - name: "versionAfter"
    type: "field"
    bits: 32
    description: "Model version after unlearning"
    validation: "Must be greater than versionBefore"
    
  - name: "unlearningSetRoot"
    type: "field"
    bits: 254
    description: "Merkle root of unlearning request set"
    
  - name: "embeddingTreeRootBefore"
    type: "field"
    bits: 254
    description: "Merkle root of embedding tree before unlearning"
    
  - name: "embeddingTreeRootAfter"
    type: "field"
    bits: 254
    description: "Merkle root of embedding tree after unlearning"
    validation: "Must differ from embeddingTreeRootBefore"
    
  - name: "modelStateRootBefore"
    type: "field"
    bits: 254
    description: "Hash of model state before unlearning"
    
  - name: "modelStateRootAfter"
    type: "field"
    bits: 254
    description: "Hash of model state after unlearning"
    validation: "Must differ from modelStateRootBefore"
    
  - name: "privacyBudget"
    type: "field"
    bits: 64
    description: "Maximum allowed privacy loss (ε in DP)"
    
  - name: "sensitivityParameter"
    type: "field"
    bits: 64
    description: "Sensitivity parameter for privacy computation"
    
  - name: "embeddingCommitmentBefore"
    type: "field"
    bits: 254
    description: "Commitment to embeddings before unlearning"
    
  - name: "embeddingCommitmentAfter"
    type: "field"
    bits: 254
    description: "Commitment to embeddings after unlearning"
    
  - name: "modelCommitmentBefore"
    type: "field"
    bits: 254
    description: "Commitment to model parameters before unlearning"
    
  - name: "modelCommitmentAfter"
    type: "field"
    bits: 254
    description: "Commitment to model parameters after unlearning"
    
  - name: "requireStrictZeroing"
    type: "boolean"
    bits: 1
    description: "Flag requiring strict zeroing of embeddings"
    
  - name: "requirePrivacyGuarantee"
    type: "boolean"
    bits: 1
    description: "Flag requiring privacy budget verification"

# ==============================================================================
# PRIVATE INPUTS (395,008 signals) - CORRECTED
# ==============================================================================

private_inputs:
  - name: "documentIds"
    type: "field[256]"
    description: "Document IDs to be unlearned"
    count: 256
    
  - name: "documentSecrets"
    type: "field[256]"
    description: "Secrets for nullifier generation (ADDED for replay protection)"
    count: 256
    security_note: "Must be from cryptographically secure RNG"
    
  - name: "documentMerkleProofs"
    type: "field[256][20]"
    description: "Merkle proofs for document inclusion"
    count: 5120  # 256 * 20
    
  - name: "documentMerkleIndices"
    type: "field[256][20]"
    description: "Merkle path indices for documents"
    count: 5120  # 256 * 20
    validation: "Each index must be binary (0 or 1)"
    
  - name: "embeddingsBefore"
    type: "field[256][1536]"
    description: "Embeddings before unlearning"
    count: 393216  # 256 * 1536
    
  - name: "embeddingsAfter"
    type: "field[256][1536]"
    description: "Embeddings after unlearning"
    count: 393216  # 256 * 1536
    validation: "Zeroed embeddings must have all dimensions = 0"
    
  - name: "embeddingBlindingBefore"
    type: "field[256]"
    description: "Blinding factors for embedding commitments (before)"
    count: 256
    security_note: "Must be non-zero and from secure RNG"
    
  - name: "embeddingBlindingAfter"
    type: "field[256]"
    description: "Blinding factors for embedding commitments (after)"
    count: 256
    security_note: "Must be non-zero and from secure RNG"
    
  - name: "modelParamsBefore"
    type: "field[128]"
    description: "Model parameters before unlearning"
    count: 128
    
  - name: "modelParamsAfter"
    type: "field[128]"
    description: "Model parameters after unlearning"
    count: 128
    
  - name: "modelBlindingBefore"
    type: "field"
    description: "Blinding factor for model commitment (before)"
    count: 1
    security_note: "Must be non-zero and from secure RNG"
    
  - name: "modelBlindingAfter"
    type: "field"
    description: "Blinding factor for model commitment (after)"
    count: 1
    security_note: "Must be non-zero and from secure RNG"
    
  - name: "unlearningMask"
    type: "boolean[256]"
    description: "Mask indicating which embeddings to unlearn"
    count: 256
    validation: "Each value must be binary (0 or 1)"
    
  - name: "updateThreshold"
    type: "field"
    description: "Threshold for model parameter updates"
    count: 1
    
  - name: "queriesCountBefore"
    type: "field"
    description: "Query count before unlearning"
    count: 1
    validation: "Must be greater than queriesCountAfter"
    
  - name: "queriesCountAfter"
    type: "field"
    description: "Query count after unlearning"
    count: 1
    
  # Total private inputs: 395,008
  # Breakdown:
  # - Document-related: 10,752 (256 + 256 + 5120 + 5120)
  # - Embedding-related: 393,984 (393,216 + 393,216 + 256 + 256)
  # - Model-related: 258 (128 + 128 + 1 + 1)
  # - Control inputs: 514 (256 + 1 + 1 + 1)

# ==============================================================================
# OUTPUT SIGNALS (3 signals)
# ==============================================================================

outputs:
  - name: "verificationPassed"
    type: "boolean"
    description: "1 if all verification checks passed, 0 otherwise"
    
  - name: "privacyLossValue"
    type: "field"
    description: "Computed privacy loss value"
    validation: "Must be within privacy budget if requirePrivacyGuarantee = 1"
    
  - name: "unlearningMetric"
    type: "field"
    description: "Metric quantifying unlearning effectiveness"
    interpretation: "Lower value indicates better unlearning"

# ==============================================================================
# SECURITY ENHANCEMENTS (NEW IN v1.0.1)
# ==============================================================================

security_enhancements:
  nullifier_system:
    description: "Prevents replay attacks"
    implementation: "SHA256/Poseidon hash of (secret, documentId, timestamp)"
    storage: "Nullifiers stored on-chain to prevent reuse"
    
  safe_division:
    description: "Prevents division by zero vulnerabilities"
    implementation: "Custom SafeDivision template with zero checks"
    fallback: "Returns 0 if denominator is 0"
    
  blinding_validation:
    description: "Ensures proper randomness for commitments"
    implementation: "Non-zero checks for all blinding factors"
    requirement: "Must use cryptographically secure RNG"
    
  range_proofs:
    description: "Prevents integer overflow and invalid values"
    implementation: "Enhanced RangeProof template with proper constraints"
    coverage: "Timestamps, privacy budget, query counts"
    
  constraint_completeness:
    description: "All intermediate signals properly constrained"
    implementation: "Added constraints to 15 previously unconstrained signals"
    verification: "Every signal has === or <== constraint"

# ==============================================================================
# VERIFICATION GUARANTEES
# ==============================================================================

guarantees:
  soundness:
    description: "Probability that a false proof is accepted"
    value: "2^-128"
    assumption: "Discrete logarithm hardness on BN128"
    
  completeness:
    description: "Probability that a valid proof is rejected"
    value: "0"
    note: "Perfect completeness for Groth16"
    
  zero_knowledge:
    description: "Information leaked about private inputs"
    value: "computationally zero"
    assumption: "Decisional Diffie-Hellman on BN128"
    
  knowledge_soundness:
    description: "Proof of knowledge extraction"
    value: "witness extractable"
    note: "Can extract valid witness from valid proof"
    
  replay_protection:
    description: "Prevention of proof reuse"
    value: "cryptographically enforced"
    mechanism: "Nullifier-based with on-chain storage"

# ==============================================================================
# SECURITY PROPERTIES
# ==============================================================================

security_properties:
  unlearning_verification:
    - "Document membership in unlearning set"
    - "Embedding zeroing completeness"
    - "Model parameter updates within threshold"
    - "Privacy budget compliance"
    - "Timestamp validity and ordering"
    - "Version consistency and progression"
    - "Nullifier uniqueness for replay protection"
    
  privacy_preservation:
    - "Document IDs remain private"
    - "Embedding values remain private"
    - "Model parameters remain private"
    - "Blinding factors never revealed"
    - "Nullifier secrets never exposed"
    
  cryptographic_security:
    - "Collision-resistant hash functions (Poseidon)"
    - "Binding and hiding commitments"
    - "Non-malleability of proofs"
    - "Simulation-extractability"

# ==============================================================================
# PERFORMANCE CHARACTERISTICS
# ==============================================================================

performance:
  compilation:
    time: "10-30 minutes"
    memory: "16GB"
    constraints: "~15.73M"
    r1cs_size: "~500MB"
    
  trusted_setup:
    phase1_time: "2-4 hours"
    phase2_time: "30-60 minutes"
    proving_key_size: "2.5GB"
    verification_key_size: "2KB"
    participants_required: "50+"
    
  witness_generation:
    time: "5-15 seconds"
    memory: "32GB"
    cpu_cores: "16"
    optimizations: ["multi-threading", "memory mapping"]
    
  proof_generation:
    time: "20-40 seconds"
    memory: "64GB"
    cpu_cores: "32"
    gpu_acceleration: "supported"
    fft_operations: "~100M"
    
  proof_verification:
    time: "5-10 milliseconds"
    memory: "1MB"
    cpu_cores: "1"
    pairing_operations: "3"
    scalar_multiplications: "~20"
    
  batch_verification:
    time: "O(n) but with constant optimization"
    max_batch_size: "1000 proofs"
    time_per_proof: "~2ms"

# ==============================================================================
# CIRCUIT COMPONENTS
# ==============================================================================

components:
  hash_functions:
    - name: "Poseidon"
      purpose: "Commitment and Merkle trees"
      security: "128-bit"
      constraints_per_hash: "~153"
      
  comparison_operators:
    - name: "LessThan"
      purpose: "Range proofs and comparisons"
      constraints: "~252"
      
    - name: "GreaterThan"
      purpose: "Threshold checks"
      constraints: "~252"
      
    - name: "IsEqual"
      purpose: "Equality checks"
      constraints: "1"
      
    - name: "IsZero"
      purpose: "Zero checks for division safety"
      constraints: "1"
      
  arithmetic_operations:
    - name: "SafeDivision"
      purpose: "Division with zero-divisor protection"
      constraints: "~255"
      security_note: "Returns 0 if denominator is 0"
      
    - name: "EmbeddingNormSquared"
      purpose: "L2 norm computation with overflow protection"
      constraints: "~3072"
      
    - name: "EmbeddingDotProduct"
      purpose: "Similarity computation"
      constraints: "~3072"
      
  cryptographic_primitives:
    - name: "MerkleTreeInclusionProof"
      purpose: "Document membership"
      constraints: "~3060"
      security_note: "Enhanced with binary constraint on indices"
      
    - name: "EmbeddingCommitment"
      purpose: "Commitment to embeddings"
      constraints: "~154"
      security_note: "Validates non-zero blinding"
      
    - name: "NullifierGenerator"
      purpose: "Replay attack prevention"
      constraints: "~153"
      security_note: "New component for v1.0.1"
      
  verification_modules:
    - name: "DocumentUnlearningProof"
      purpose: "Verify document unlearning with nullifiers"
      constraints: "~4153"
      
    - name: "EmbeddingUnlearningProof"
      purpose: "Verify embedding zeroing"
      constraints: "~1.5M"
      
    - name: "ModelParameterUpdateProof"
      purpose: "Verify model updates"
      constraints: "~50K"
      
    - name: "PrivacyLossComputation"
      purpose: "Compute privacy loss with safe division"
      constraints: "~755"

# ==============================================================================
# CONSTRAINT BREAKDOWN
# ==============================================================================

constraint_breakdown:
  merkle_proofs: "~795K"  # Increased due to nullifier checks
  embedding_operations: "~12M"  # 256 embeddings * 1536 dim * various ops
  model_updates: "~50K"  # 128 parameters * various checks
  commitments: "~82K"  # Increased with validation checks
  privacy_computation: "~12K"  # Increased with safe division
  metadata_verification: "~7K"  # Increased with range checks
  merkle_root_updates: "~500K"  # Tree recomputation
  nullifier_generation: "~39K"  # New: 256 nullifiers * ~153 constraints
  safety_checks: "~5K"  # New: Division checks, overflow protection
  miscellaneous: "~2M"  # Control flow, auxiliary constraints
  
  total: "~15.73M constraints"

# ==============================================================================
# TRUSTED SETUP PARAMETERS
# ==============================================================================

trusted_setup:
  ceremony:
    type: "Powers of Tau"
    curve: "bn128"
    max_constraints: "2^24"  # 16.7M
    phase1_participants: "50+"
    phase2_participants: "10+"
    
  phase1:
    output: "powers_of_tau_24.ptau"
    size: "1.2GB"
    constraints_supported: "16,777,216"
    
  phase2:
    input: "powers_of_tau_24.ptau"
    circuit_specific: true
    outputs:
      - "proving_key.zkey"  # 2.5GB
      - "verification_key.json"  # 2KB
      
  verification:
    method: "Multi-party computation transcript"
    public_randomness: "Blockchain-anchored"
    verification_script: "verify_setup.sh"

# ==============================================================================
# RANDOMNESS REQUIREMENTS (ENHANCED)
# ==============================================================================

randomness_requirements:
  sources:
    - name: "System CSPRNG"
      purpose: "Blinding factors"
      minimum_entropy: "256 bits"
      validation: "NIST SP 800-90A compliant"
      
    - name: "Hardware RNG"
      purpose: "Nullifier secrets"
      minimum_entropy: "256 bits"
      fallback: "System CSPRNG with additional mixing"
      
    - name: "Blockchain randomness"
      purpose: "Public randomness for setup"
      source: "Block hashes or VRF"
      
  validation:
    - "All blinding factors must be non-zero"
    - "Nullifier secrets must be unique per document"
    - "Randomness must be refreshed for each proof"
    - "No randomness reuse across different proofs"
    
  storage:
    - "Blinding factors: Never stored, regenerated each time"
    - "Nullifier secrets: Stored securely, never transmitted"
    - "Used nullifiers: Stored on-chain for replay prevention"

