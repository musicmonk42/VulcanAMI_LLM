# ==============================================================================
# NGINX ORIGIN SERVER CONFIGURATION
# ==============================================================================
# Vulcan LLM Origin Server - MinIO Proxy with Advanced Features
# Version: 4.6.0
# Last Updated: 2025-11-14
# NGINX Version: 1.24+
# Documentation: https://docs.vulcanami.io/nginx-origin
# ==============================================================================

# ==============================================================================
# UPSTREAM BACKEND CONFIGURATION
# ==============================================================================

# Primary MinIO cluster with health checks and load balancing
upstream minio_backend {
    # Load balancing method: least_conn, ip_hash, hash, random
    least_conn;
    
    # Keepalive connections for better performance
    keepalive 256;
    keepalive_requests 10000;
    keepalive_timeout 300s;
    
    # Primary MinIO nodes
    server minio-1:9000 max_fails=3 fail_timeout=30s weight=100;
    server minio-2:9000 max_fails=3 fail_timeout=30s weight=100;
    server minio-3:9000 max_fails=3 fail_timeout=30s weight=100;
    server minio-4:9000 max_fails=3 fail_timeout=30s weight=100 backup;
    
    # Health check zone
    zone minio_backend 64k;
}

# Backup MinIO cluster for disaster recovery
upstream minio_backup {
    least_conn;
    keepalive 128;
    
    server minio-backup-1:9000 max_fails=2 fail_timeout=30s;
    server minio-backup-2:9000 max_fails=2 fail_timeout=30s;
    
    zone minio_backup 32k;
}

# Read-only replicas for GET requests
upstream minio_readonly {
    # Use consistent hashing for cache efficiency
    hash $request_uri consistent;
    
    keepalive 512;
    keepalive_requests 20000;
    keepalive_timeout 300s;
    
    server minio-ro-1:9000 max_fails=2 fail_timeout=15s;
    server minio-ro-2:9000 max_fails=2 fail_timeout=15s;
    server minio-ro-3:9000 max_fails=2 fail_timeout=15s;
    server minio-ro-4:9000 max_fails=2 fail_timeout=15s;
    
    zone minio_readonly 64k;
}

# ==============================================================================
# CACHE CONFIGURATION
# ==============================================================================

# Memory-based cache for hot content
proxy_cache_path /var/cache/nginx/hot 
    levels=1:2 
    keys_zone=hot_cache:512m 
    max_size=10g 
    inactive=24h 
    use_temp_path=off
    loader_threshold=300
    loader_files=200
    manager_files=500
    manager_threshold=200;

# Disk-based cache for warm content
proxy_cache_path /var/cache/nginx/warm 
    levels=1:2 
    keys_zone=warm_cache:256m 
    max_size=50g 
    inactive=7d 
    use_temp_path=off;

# Cold storage cache for archive content
proxy_cache_path /var/cache/nginx/cold 
    levels=2:2 
    keys_zone=cold_cache:128m 
    max_size=100g 
    inactive=30d 
    use_temp_path=off;

# Bloom filter cache (small, high-frequency)
proxy_cache_path /var/cache/nginx/bloom 
    levels=1 
    keys_zone=bloom_cache:64m 
    max_size=1g 
    inactive=1h 
    use_temp_path=off;

# Manifest cache
proxy_cache_path /var/cache/nginx/manifest 
    levels=1:2 
    keys_zone=manifest_cache:256m 
    max_size=20g 
    inactive=6h 
    use_temp_path=off;

# ==============================================================================
# RATE LIMITING ZONES
# ==============================================================================

# Rate limit by IP address
limit_req_zone $binary_remote_addr zone=by_ip:10m rate=100r/s;

# Rate limit by user agent (bot protection)
limit_req_zone $http_user_agent zone=by_user_agent:10m rate=50r/s;

# Rate limit for API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1000r/s;

# Rate limit for health checks (prevent abuse)
limit_req_zone $binary_remote_addr zone=healthcheck_limit:1m rate=10r/s;

# Rate limit for proofs endpoint
limit_req_zone $binary_remote_addr zone=proofs_limit:10m rate=200r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# Request body size limit zone
client_body_buffer_size 128k;
client_max_body_size 100m;

# ==============================================================================
# GEO-IP CONFIGURATION (for geolocation-based routing)
# ==============================================================================

geo $geo_country {
    default US;
    # Add geo-ip mappings here
    # Example: 1.2.3.0/24 CN;
}

# ==============================================================================
# SECURITY MAPS
# ==============================================================================

# Block malicious user agents
map $http_user_agent $blocked_agent {
    default 0;
    ~*bot 0;
    ~*spider 0;
    ~*crawler 0;
    ~*scanner 1;
    ~*nikto 1;
    ~*sqlmap 1;
    ~*nmap 1;
    ~*masscan 1;
    ~*havij 1;
    ~*acunetix 1;
}

# Detect suspicious requests
map $request_uri $suspicious_request {
    default 0;
    ~*\.\. 1;
    ~*\x00 1;
    ~*\%00 1;
    ~*union.*select 1;
    ~*drop.*table 1;
    ~*<script 1;
}

# Valid content types for uploads
map $http_content_type $valid_content_type {
    default 0;
    "application/octet-stream" 1;
    "application/zstd" 1;
    "application/x-zstd" 1;
    "" 1;
}

# Cache validity by status code
map $status $cache_validity {
    200 "7d";
    206 "7d";
    301 "1h";
    302 "10m";
    404 "1m";
    default "0s";
}

# ==============================================================================
# LOGGING CONFIGURATION
# ==============================================================================

# Custom log format with detailed metrics
log_format detailed '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'cs=$upstream_cache_status '
                    'host=$host sn=$server_name '
                    'ua="$upstream_addr" us=$upstream_status '
                    'request_id=$request_id '
                    'bytes_sent=$bytes_sent '
                    'request_length=$request_length '
                    'connection=$connection '
                    'connection_requests=$connection_requests '
                    'ssl_protocol=$ssl_protocol '
                    'ssl_cipher=$ssl_cipher';

# Performance metrics log format
log_format performance '$remote_addr [$time_local] '
                      '"$request" $status '
                      'request_time=$request_time '
                      'upstream_time=$upstream_response_time '
                      'cache=$upstream_cache_status '
                      'bytes=$bytes_sent';

# Security audit log format
log_format security '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status '
                   '"$http_user_agent" '
                   'blocked_agent=$blocked_agent '
                   'suspicious=$suspicious_request '
                   'request_id=$request_id';

# Cache analytics log format
log_format cache_analytics '$time_iso8601|$request_uri|$upstream_cache_status|'
                          '$upstream_response_time|$bytes_sent|$status';

# ==============================================================================
# SSL/TLS CONFIGURATION
# ==============================================================================

# SSL session cache for performance
ssl_session_cache shared:SSL:50m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# Modern SSL configuration
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
ssl_prefer_server_ciphers off;

# OCSP stapling
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# ==============================================================================
# MAIN HTTP SERVER (PORT 80)
# ==============================================================================

server {
    listen 80 default_server reuseport;
    listen [::]:80 default_server reuseport;
    server_name _;
    
    # Server identification
    server_tokens off;
    more_clear_headers 'Server';
    more_clear_headers 'X-Powered-By';
    
    # Root directory (for static files if needed)
    root /var/www/html;
    
    # Character set
    charset utf-8;
    
    # Logging
    access_log /var/log/nginx/origin-access.log detailed buffer=32k flush=5s;
    error_log /var/log/nginx/origin-error.log warn;
    
    # Additional security logging
    access_log /var/log/nginx/origin-security.log security if=$blocked_agent;
    access_log /var/log/nginx/origin-performance.log performance buffer=64k flush=10s;
    
    # ==========================================================================
    # GLOBAL CONFIGURATION
    # ==========================================================================
    
    # Client settings
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 60s;
    
    # Buffer sizes
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Keepalive
    keepalive_timeout 65s;
    keepalive_requests 1000;
    
    # TCP optimizations
    tcp_nodelay on;
    tcp_nopush on;
    sendfile on;
    sendfile_max_chunk 512k;
    
    # ==========================================================================
    # GLOBAL VARIABLES
    # ==========================================================================
    
    set $minio_host "minio-1";
    set $bucket "graphix-vulcan-use1";
    set $backup_bucket "graphix-vulcan-backup";
    
    # Request ID for tracing
    set $request_id $request_id;
    
    # ==========================================================================
    # SECURITY HEADERS
    # ==========================================================================
    
    # CORS headers
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range, If-Range, If-None-Match, X-Bloom, X-Request-ID" always;
    add_header Access-Control-Expose-Headers "ETag, X-Pack-Merkle, X-Bloom, Content-Length, Content-Range, Accept-Ranges" always;
    add_header Access-Control-Max-Age 3600 always;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Relaxed CSP for chat interface - allows CDN scripts and inline styles
    # NOTE: 'unsafe-inline' and 'unsafe-eval' are required for:
    # - marked.js (Markdown rendering) which may use eval internally
    # - highlight.js (syntax highlighting) for code blocks
    # - Inline event handlers in the chat HTML
    # For production, consider moving to nonce-based CSP if security requirements increase
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Custom headers
    add_header Accept-Ranges bytes always;
    add_header X-Cache-Status $upstream_cache_status always;
    add_header X-Request-ID $request_id always;
    add_header X-Server-Version "4.6.0" always;
    
    # ==========================================================================
    # SECURITY BLOCKS
    # ==========================================================================
    
    # Block malicious user agents
    if ($blocked_agent) {
        return 403 "Access denied";
    }
    
    # Block suspicious requests
    if ($suspicious_request) {
        return 400 "Bad request";
    }
    
    # ==========================================================================
    # HEALTH CHECK ENDPOINT
    # ==========================================================================
    
    location = /healthz {
        access_log off;
        
        # Rate limiting for health checks
        limit_req zone=healthcheck_limit burst=20 nodelay;
        
        # Return health status
        return 200 "ok\n";
        add_header Content-Type text/plain;
        add_header X-Health-Check "pass" always;
        add_header X-Timestamp $msec always;
    }
    
    # Detailed health check with upstream status
    location = /healthz/detailed {
        access_log /var/log/nginx/healthcheck.log detailed;
        
        limit_req zone=healthcheck_limit burst=10 nodelay;
        
        # Return JSON health status
        default_type application/json;
        return 200 '{"status":"healthy","version":"4.6.0","timestamp":"$msec","upstream":"available"}';
    }
    
    # Readiness probe
    location = /readyz {
        access_log off;
        
        # Check if service is ready to accept traffic
        return 200 "ready\n";
        add_header Content-Type text/plain;
    }
    
    # Liveness probe
    location = /livez {
        access_log off;
        
        return 200 "alive\n";
        add_header Content-Type text/plain;
    }
    
    # ==========================================================================
    # METRICS ENDPOINT (for Prometheus)
    # ==========================================================================
    
    location = /metrics {
        access_log off;
        
        # Restrict to monitoring systems only
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        # Stub status for metrics
        stub_status;
    }
    
    # ==========================================================================
    # NGINX STATUS (restricted)
    # ==========================================================================
    
    location = /nginx_status {
        access_log off;
        
        # Restrict to internal networks only
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        stub_status;
    }
    
    # ==========================================================================
    # MEMORY ENDPOINT - PACK FILES (.gpk.zst)
    # ==========================================================================
    
    location ~ ^/v1/memory/([a-f0-9]{64})$ {
        # Rate limiting
        limit_req zone=api_limit burst=500 nodelay;
        limit_conn conn_limit_per_ip 50;
        
        # Request validation
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$ ) {
            return 405 "Method not allowed";
        }
        
        # Handle OPTIONS for CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, If-Range, If-None-Match, X-Bloom" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
        
        # Extract hash and compute prefix
        set $hash $1;
        set $prefix2 "";
        
        # Extract first 2 characters for prefix-based routing
        if ($hash ~* "^([a-f0-9]{2})") {
            set $prefix2 $1;
        }
        
        # Cache configuration
        proxy_cache hot_cache;
        proxy_cache_key "$scheme$host$uri$is_args$args$http_range";
        proxy_cache_valid 200 206 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_lock_age 5s;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        
        # Bypass cache for certain conditions
        proxy_cache_bypass $http_pragma $http_authorization;
        proxy_no_cache $http_pragma $http_authorization;
        
        # Buffering configuration
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 2048m;
        
        # Range requests support
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header If-None-Match $http_if_none_match;
        
        # Custom headers
        proxy_set_header X-Bloom $http_x_bloom;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection management
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        
        # ETag support
        etag on;
        
        # Compression
        gzip off;  # Already compressed (.zst files)
        
        # Primary upstream (use read-only replicas for better performance)
        proxy_pass http://minio_readonly/$bucket/origin/v1/memory/$prefix2/$hash.gpk.zst;
        
        # Fallback to primary cluster on error
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 20s;
        
        # Error handling
        error_page 404 = @memory_fallback;
        error_page 500 502 503 504 = @memory_error;
        
        # Add custom response headers
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key "$scheme$host$uri$is_args$args$http_range" always;
        add_header X-Prefix "$prefix2" always;
        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Response-Time $upstream_response_time always;
    }
    
    # Fallback location for memory endpoint
    location @memory_fallback {
        internal;
        
        # Try backup cluster
        proxy_pass http://minio_backup/$bucket/origin/v1/memory/$prefix2/$hash.gpk.zst;
        
        proxy_cache warm_cache;
        proxy_cache_valid 200 206 3d;
        
        # Same proxy settings as primary
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        
        add_header X-Cache-Status "FALLBACK" always;
    }
    
    # Error handling for memory endpoint
    location @memory_error {
        internal;
        
        default_type application/json;
        return 503 '{"error":"service_unavailable","message":"Unable to retrieve pack file","request_id":"$request_id"}';
    }
    
    # ==========================================================================
    # BLOOM FILTER ENDPOINT (optimized for small, frequent requests)
    # ==========================================================================
    
    location ~ ^/v1/bloom/([a-f0-9]{64})$ {
        # Higher rate limit for bloom filters (smaller, more frequent)
        limit_req zone=api_limit burst=1000 nodelay;
        limit_conn conn_limit_per_ip 100;
        
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$ ) {
            return 405;
        }
        
        set $hash $1;
        set $prefix2 "";
        
        if ($hash ~* "^([a-f0-9]{2})") {
            set $prefix2 $1;
        }
        
        # Aggressive caching for bloom filters
        proxy_cache bloom_cache;
        proxy_cache_key "$scheme$host$uri";
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        # Minimal buffering (small files)
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 4 32k;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        
        etag on;
        gzip off;
        
        proxy_pass http://minio_readonly/$bucket/origin/v1/bloom/$prefix2/$hash.bloom;
        
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Bloom-Filter "true" always;
    }
    
    # ==========================================================================
    # MANIFEST ENDPOINT
    # ==========================================================================
    
    location ~ ^/v1/manifest/([a-f0-9]{64})$ {
        limit_req zone=api_limit burst=500 nodelay;
        
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$ ) {
            return 405;
        }
        
        set $hash $1;
        set $prefix2 "";
        
        if ($hash ~* "^([a-f0-9]{2})") {
            set $prefix2 $1;
        }
        
        # Cache manifests with ETag support
        proxy_cache manifest_cache;
        proxy_cache_key "$scheme$host$uri$http_if_none_match";
        proxy_cache_valid 200 6h;
        proxy_cache_valid 304 6h;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_revalidate on;
        
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header If-None-Match $http_if_none_match;
        
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        
        etag on;
        
        # Enable gzip for JSON manifests
        gzip on;
        gzip_vary on;
        gzip_types application/json;
        gzip_comp_level 6;
        
        proxy_pass http://minio_readonly/$bucket/origin/v1/manifest/$prefix2/$hash.manifest.json;
        
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Manifest "true" always;
    }
    
    # ==========================================================================
    # PROOFS ENDPOINT
    # ==========================================================================
    
    location ~ ^/proofs/(.*)$ {
        limit_req zone=proofs_limit burst=100 nodelay;
        limit_conn conn_limit_per_ip 25;
        
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$ ) {
            return 405;
        }
        
        set $proof_path $1;
        
        # Cache proofs
        proxy_cache cold_cache;
        proxy_cache_key "$scheme$host$uri";
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 10m;
        proxy_cache_use_stale error timeout;
        
        # Disable buffering for streaming
        proxy_buffering off;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        
        gzip off;
        
        proxy_pass http://minio_backend/$bucket/proofs/$proof_path;
        
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Proof "true" always;
        
        # Error handling
        error_page 404 = @proof_not_found;
    }
    
    location @proof_not_found {
        internal;
        default_type application/json;
        return 404 '{"error":"proof_not_found","path":"$uri","request_id":"$request_id"}';
    }
    
    # ==========================================================================
    # BATCH DOWNLOAD ENDPOINT (for multiple files)
    # ==========================================================================
    
    location ~ ^/v1/batch/memory$ {
        limit_req zone=api_limit burst=50 nodelay;
        
        if ($request_method != POST) {
            return 405;
        }
        
        # Validate content type
        if ($valid_content_type = 0) {
            return 415 "Unsupported media type";
        }
        
        client_max_body_size 10m;
        
        # Forward to batch processing service
        proxy_pass http://localhost:8080/internal/batch;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
    }
    
    # ==========================================================================
    # CACHE MANAGEMENT ENDPOINTS (restricted)
    # ==========================================================================
    
    location = /cache/purge {
        # Only allow from internal networks
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        if ($request_method != POST) {
            return 405;
        }
        
        # Purge cache by URL pattern
        # Implementation depends on nginx modules (e.g., ngx_cache_purge)
        return 200 "Cache purge initiated\n";
    }
    
    location = /cache/stats {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        # Return cache statistics
        default_type application/json;
        return 200 '{"hot_cache":"hot_cache","warm_cache":"warm_cache","cold_cache":"cold_cache","bloom_cache":"bloom_cache","manifest_cache":"manifest_cache"}';
    }
    
    # ==========================================================================
    # ADMIN ENDPOINTS (highly restricted)
    # ==========================================================================
    
    location /admin {
        # Restrict to localhost only
        allow 127.0.0.1;
        allow ::1;
        deny all;
        
        # Require authentication
        auth_basic "Admin Area";
        auth_basic_user_file /etc/nginx/.htpasswd;
        
        # Admin interface
        default_type text/html;
        return 200 "Admin interface\n";
    }
    
    # ==========================================================================
    # STATIC ASSETS (if needed)
    # ==========================================================================
    
    location /static/ {
        alias /var/www/static/;
        
        # Aggressive caching for static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Compression
        gzip on;
        gzip_static on;
        gzip_vary on;
        gzip_types text/css application/javascript image/svg+xml;
        
        # Security
        add_header X-Content-Type-Options "nosniff" always;
        
        # Access control
        access_log off;
    }
    
    # ==========================================================================
    # ROBOTS.TXT (prevent search engine indexing)
    # ==========================================================================
    
    location = /robots.txt {
        access_log off;
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }
    
    # ==========================================================================
    # FAVICON (prevent 404 errors)
    # ==========================================================================
    
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
    
    # ==========================================================================
    # DEFAULT LOCATION (404)
    # ==========================================================================
    
    location / {
        # Log all unmatched requests
        access_log /var/log/nginx/unmatched.log detailed;
        
        default_type application/json;
        return 404 '{"error":"not_found","message":"Endpoint not found","request_id":"$request_id","version":"4.6.0"}';
    }
    
    # ==========================================================================
    # ERROR PAGES
    # ==========================================================================
    
    # Custom error page for 400
    error_page 400 = @error_400;
    location @error_400 {
        internal;
        default_type application/json;
        return 400 '{"error":"bad_request","message":"Invalid request","request_id":"$request_id"}';
    }
    
    # Custom error page for 403
    error_page 403 = @error_403;
    location @error_403 {
        internal;
        default_type application/json;
        return 403 '{"error":"forbidden","message":"Access denied","request_id":"$request_id"}';
    }
    
    # Custom error page for 404
    error_page 404 = @error_404;
    location @error_404 {
        internal;
        default_type application/json;
        return 404 '{"error":"not_found","message":"Resource not found","request_id":"$request_id"}';
    }
    
    # Custom error page for 405
    error_page 405 = @error_405;
    location @error_405 {
        internal;
        default_type application/json;
        return 405 '{"error":"method_not_allowed","message":"Method not allowed","request_id":"$request_id"}';
    }
    
    # Custom error page for 429
    error_page 429 = @error_429;
    location @error_429 {
        internal;
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests","request_id":"$request_id","retry_after":"60"}';
    }
    
    # Custom error page for 500
    error_page 500 502 503 504 = @error_5xx;
    location @error_5xx {
        internal;
        default_type application/json;
        return 503 '{"error":"service_unavailable","message":"Service temporarily unavailable","request_id":"$request_id"}';
    }
}

# ==============================================================================
# HTTPS SERVER (PORT 443)
# ==============================================================================

server {
    listen 443 ssl http2 default_server reuseport;
    listen [::]:443 ssl http2 default_server reuseport;
    server_name _;
    
    # SSL certificates
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_trusted_certificate /etc/nginx/ssl/ca.pem;
    
    # SSL configuration (already defined globally)
    # ssl_protocols, ssl_ciphers, etc. are inherited
    
    # HTTP/2 specific settings
    http2_max_field_size 16k;
    http2_max_header_size 32k;
    http2_max_requests 1000;
    
    # Server tokens
    server_tokens off;
    
    # Logging
    access_log /var/log/nginx/origin-https-access.log detailed buffer=32k flush=5s;
    error_log /var/log/nginx/origin-https-error.log warn;
    
    # Include all HTTP locations
    # (For production, extract common locations to a separate file and include it)
    
    # Redirect to HTTP configuration or duplicate all locations here
    # For simplicity, showing a minimal example:
    
    location / {
        # All the same location blocks as HTTP server
        # In production, use include directives to avoid duplication
        return 200 "HTTPS endpoint - Use HTTP server configuration\n";
    }
}

