# graphix-arena-dev.yaml
# One-file, dev-friendly manifest: Namespace + Deployment + Service.
# Defaults are lightweight, with probes and sensible resources for local/dev clusters.

apiVersion: v1
kind: Namespace
metadata:
  name: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    env: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphix-arena
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  # Note: HPA will manage replicas dynamically; this serves as the initial count
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: graphix-arena
      app.kubernetes.io/instance: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphix-arena
        app.kubernetes.io/instance: dev
    spec:
      # Disable automount service account token
      automountServiceAccountToken: false
      
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      
      containers:
        - name: graphix-arena
          image: graphix/graphix-arena:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          
          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          
          # Volume mounts for readOnlyRootFilesystem compatibility
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-data
              mountPath: /app/data
          
          env:
            - name: ARENA_MODE
              value: "dev"
            - name: GRAPHIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graphix-api-secret
                  key: api-key
            # Add anything else you need here:
            # - name: REGISTRY_ENDPOINT
            #   value: "http://graphix-registry.dev.svc:8787"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
      
      # Volumes for readOnlyRootFilesystem compatibility
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-data
          emptyDir: {}
      # Uncomment if you need additional config files, creds, etc.
      #   - name: config
      #     configMap:
      #       name: graphix-arena-config
---
apiVersion: v1
kind: Service
metadata:
  name: graphix-arena
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  selector:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
  # For easy access from your laptop on minikube/kind, use NodePort.
  # If you're on a cloud dev cluster with ingress, switch to ClusterIP.
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8181
      targetPort: 8181
---
# Secret for API credentials
apiVersion: v1
kind: Secret
metadata:
  name: graphix-api-secret
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
type: Opaque
stringData:
  api-key: "REPLACE_WITH_ACTUAL_API_KEY"
---
# PodDisruptionBudget to ensure availability during cluster maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: graphix-arena-pdb
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: graphix-arena
      app.kubernetes.io/instance: dev
---
# HorizontalPodAutoscaler for automatic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: graphix-arena-hpa
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: graphix-arena
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ResourceQuota to prevent resource exhaustion
apiVersion: v1
kind: ResourceQuota
metadata:
  name: graphix-dev-quota
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "10"
---
# NetworkPolicy to restrict pod-to-pod communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: graphix-arena-netpol
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: graphix-arena
      app.kubernetes.io/instance: dev
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphix-arena
      ports:
        - protocol: TCP
          port: 8181
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53  # DNS
        - protocol: UDP
          port: 53  # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443  # HTTPS
        - protocol: TCP
          port: 80   # HTTP