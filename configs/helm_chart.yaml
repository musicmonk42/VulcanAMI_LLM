# graphix-arena-dev.yaml
# One-file, dev-friendly manifest: Namespace + Deployment + Service.
# Defaults are lightweight, with probes and sensible resources for local/dev clusters.

apiVersion: v1
kind: Namespace
metadata:
  name: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    env: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphix-arena
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: graphix-arena
      app.kubernetes.io/instance: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphix-arena
        app.kubernetes.io/instance: dev
    spec:
      # Disable automount service account token
      automountServiceAccountToken: false
      
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001  # High UID for enhanced security (CKV_K8S_40)
        runAsGroup: 10001
        fsGroup: 20000
        seccompProfile:
          type: RuntimeDefault
      
      containers:
        - name: graphix-arena
          image: graphix/graphix-arena:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          
          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          
          # Volume mounts for readOnlyRootFilesystem compatibility
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-data
              mountPath: /app/data
            - name: app-secrets
              mountPath: /etc/secrets
              readOnly: true
          
          # Use secrets as files where possible for better security
          env:
            - name: ARENA_MODE
              value: "dev"
            - name: GRAPHIX_API_KEY_FILE
              value: /etc/secrets/api-key
            # Add anything else you need here:
            # - name: REGISTRY_ENDPOINT
            #   value: "http://graphix-registry.dev.svc:8787"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
      
      # Volumes for readOnlyRootFilesystem compatibility
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-data
          emptyDir: {}
        - name: app-secrets
          secret:
            secretName: graphix-api-secret
            items:
            - key: api-key
              path: api-key
      # Uncomment if you need additional config files, creds, etc.
      #   - name: config
      #     configMap:
      #       name: graphix-arena-config
---
apiVersion: v1
kind: Service
metadata:
  name: graphix-arena
  namespace: graphix-dev
  labels:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
spec:
  selector:
    app.kubernetes.io/name: graphix-arena
    app.kubernetes.io/instance: dev
  # For easy access from your laptop on minikube/kind, use NodePort.
  # If you're on a cloud dev cluster with ingress, switch to ClusterIP.
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 8181
      targetPort: 8181
      nodePort: 30181