version: "1"
auto_apply:
  enabled: true
  # Budget limits for a single auto-apply
  max_files: 3
  max_total_loc: 100

  # Allow/deny patterns (POSIX-style, relative to repo root)
  allowed_globs:
    - "src/vulcan/**/*.py"
    - "src/safety/**/*.py"
    - "tests/**/*.py"
    - "configs/**"
    - "scripts/**"
    - "!src/**/auth/**"
    - "!src/**/security/**"
    - "!src/**/db/**"
    - "!src/**/migrations/**"
    - "!src/**/network/**"
    - "!src/**/concurrency/**"
    - "!src/**/deployment/**"
    - "!src/**/kubernetes/**"
    - "!src/**/terraform/**"
    - "!configs/profile_production.json"
    - "!configs/profile_staging.json"

  deny_globs:
    - "**/__pycache__/**"
    - "*.pyc"
    - ".git/**"
    - "venv/**"
    - "**/*.lock"
    - "**/requirements*.txt"
    - "**/poetry.lock"
    - "Dockerfile"
    - "**/pyproject.toml"
    - "**/*.yml"  # pipeline/deploy files; whitelist explicit ones if needed

  # Pre-apply gates. Each item can be a string (command) or an object with cmd/timeout_s/cwd/env
  gates:
    commands:
      - cmd: ["python", "-m", "pytest", "-x"]
        timeout_s: 30
      - cmd: ["python", "-m", "mypy", "--strict"]
        timeout_s: 20
      - cmd: ["python", "-m", "black", "--check", "."]
        timeout_s: 10

    nso_requirements:
      adversarial_detected: false
      risk_score_max: 0.3