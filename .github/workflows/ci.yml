name: CI - Test and Lint

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.7.0'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -x
          for i in 1 2 3; do
            python -m pip install --no-cache-dir --upgrade pip && \
            pip install --no-cache-dir flake8 black isort mypy pylint bandit && \
            break || (echo "Retry $i/3: pip install failed"; sleep $((i*10)))
          done

      - name: Run Black (code formatting check)
        run: |
          black --check --diff src/ tests/ || true

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff src/ tests/ || true

      - name: Run Flake8 (style guide enforcement)
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Run Pylint (code quality check)
        timeout-minutes: 10
        run: |
          set -x
          # Skip installing heavy dependencies for linting - not needed
          # for i in 1 2 3; do
          #   pip install -r requirements.txt && break || (echo "Retry $i/3: requirements.txt install failed"; sleep $((i*10)))
          # done || true
          echo "Skipping heavy dependencies installation for linting"
          pylint src/ --exit-zero || true

      - name: Run Bandit (security linting)
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -ll || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  test:
    name: Test Python ${{ matrix.python-version }} - ${{ matrix.test-part }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
        test-part: ['unit', 'vulcan', 'integration']

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          set -x
          sudo apt-get update
          for i in 1 2 3; do
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y libpq-dev && \
            break || (echo "Retry $i/3: apt-get install failed"; sleep $((i*10)))
          done

      - name: Install Python dependencies
        run: |
          set -x
          python -m pip install --no-cache-dir --upgrade pip setuptools wheel
          
          # Install pytest-cov FIRST to ensure it's available to all xdist workers
          pip install --no-cache-dir pytest-cov
          
          # ==================================================================
          # CRITICAL: Install VULCAN as a package to enable 'import src'
          # This fixes the "No module named 'src'" error in GitHub Actions
          # ==================================================================
          echo "=================================================="
          echo "Installing VULCAN as editable package..."
          echo "=================================================="
          pip install -e .
          
          # Install test dependencies
          for i in 1 2 3; do
            pip install --no-cache-dir pytest pytest-asyncio pytest-timeout pytest-xdist mock hypothesis faker numpy python-dotenv scipy lz4 psutil && \
            break || (echo "Retry $i/3: test dependencies install failed"; sleep $((i*10)))
          done
          
          # Install requirements.txt
          for i in 1 2 3; do
            pip install --no-cache-dir -r requirements.txt && break || (echo "⚠️  Retry $i/3: requirements.txt install failed"; sleep $((i*10)))
          done || {
            echo "❌ WARNING: Some dependencies may have failed to install"
            echo "This may cause test failures. Check logs above for details."
          }

      - name: Verify VULCAN installation
        run: |
          echo "=================================================="
          echo "Verifying VULCAN package installation..."
          echo "=================================================="
          
          # Run the verification script with --verify-only to prevent background services
          # from starting and ensure clean exit in CI environment
          # Added --skip-slow-checks to speed up verification in CI
          python scripts/verify_installation.py --critical-only --verify-only --skip-slow-checks || {
            echo "❌ VULCAN installation verification failed!"
            echo "Attempting to diagnose..."
            pip show vulcan-agi || echo "Package not installed"
            python -c "import sys; print('Python path:', sys.path)"
            exit 1
          }
          
          echo "=================================================="
          echo "✓ VULCAN installation verified successfully!"
          echo "=================================================="

      - name: Set environment variables
        run: |
          echo "JWT_SECRET_KEY=$(openssl rand -base64 48)" >> $GITHUB_ENV
          echo "BOOTSTRAP_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_USER=test_user" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=test_password" >> $GITHUB_ENV
          echo "POSTGRES_DB=test_db" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}/src:$PYTHONPATH" >> $GITHUB_ENV
          # Configure test mode to prevent hanging on missing services
          echo "CI=true" >> $GITHUB_ENV
          echo "SKIP_LOCAL_LLM=true" >> $GITHUB_ENV
          echo "SKIP_OPENAI=true" >> $GITHUB_ENV
          echo "REASONING_MOCK_MODE=true" >> $GITHUB_ENV
          echo "ARENA_ENABLED=false" >> $GITHUB_ENV
          echo "TOOL_MONITOR_ENABLED=false" >> $GITHUB_ENV
          echo "MINIO_ENDPOINT=http://localhost:9000" >> $GITHUB_ENV
          # Disable Ray in tests to prevent hanging
          echo "VULCAN_ENABLE_RAY=0" >> $GITHUB_ENV
          # Enable CI-specific optimizations for faster test execution
          echo "VULCAN_CI_MODE=1" >> $GITHUB_ENV
          echo "VULCAN_FAST_FIXTURES=1" >> $GITHUB_ENV
          echo "VULCAN_MEMORY_CONSOLIDATION_INTERVAL=1" >> $GITHUB_ENV

      - name: Create minimal .env file for tests
        run: |
          cat > .env << 'EOF'
          # Minimal .env for testing
          CI=true
          SKIP_LOCAL_LLM=true
          SKIP_OPENAI=true
          REASONING_MOCK_MODE=true
          EOF
          echo "✓ Created .env file for tests"

      - name: Monitor system resources
        run: |
          echo "=== System Resources Before Tests ==="
          free -h
          df -h
          ulimit -a
          
          # Check available resources and warn if low
          available_disk=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          available_mem=$(free -g | grep "Mem:" | awk '{print $7}')
          
          echo "Available disk: ${available_disk}GB"
          echo "Available memory: ${available_mem}GB"
          
          if [ "$available_disk" -lt 5 ]; then
            echo "⚠️  WARNING: Low disk space (less than 5GB available)"
          fi
          
          if [ "$available_mem" -lt 2 ]; then
            echo "⚠️  WARNING: Low memory (less than 2GB available)"
          fi

      - name: Verify CI environment for pytest
        run: |
          echo "=== CI Environment Verification ==="
          echo "CI=$CI"
          echo "GITHUB_ACTIONS=$GITHUB_ACTIONS"
          echo "VULCAN_CI_MODE=$VULCAN_CI_MODE"
          echo "PYTHONUNBUFFERED will be set to: 1"
          python3 << 'PYTHON_SCRIPT'
          import os
          ci_mode = bool(os.environ.get('CI') or os.environ.get('GITHUB_ACTIONS') or os.environ.get('VULCAN_CI_MODE'))
          print(f'CI_MODE will be detected as: {ci_mode}')
          if not ci_mode:
              print('⚠️  WARNING: CI mode not detected! Tests may run slowly.')
              print('However, continuing with test execution...')
          else:
              print('✓ CI environment properly configured')
          PYTHON_SCRIPT

      - name: Run tests with coverage
        run: |
          set -x
          mkdir -p $GITHUB_WORKSPACE/results
          mkdir -p $GITHUB_WORKSPACE/logs
          ulimit -Sn 10240 || true
          
          # CRITICAL: Set Python to unbuffered mode to prevent GitHub Actions from
          # thinking the process is stalled due to buffered output
          export PYTHONUNBUFFERED=1
          
          # Monitor test progress in background
          (
            sleep 60
            while kill -0 $$ 2>/dev/null; do
              echo "⏳ Tests still running... ($(date +%H:%M:%S))"
              sleep 120  # Print status every 2 minutes
            done
          ) &
          MONITOR_PID=$!
          
          EXIT_CODE=0
          
          # Marker expression for fast tests (excludes slow/integration tests)
          FAST_TEST_MARKERS="not slow and not load_test and not benchmark and not integration"
          
          # Store matrix test-part in a shell variable to avoid interpolation issues
          TEST_PART="${{ matrix.test-part }}"
          
          # Verify pytest-cov is available
          echo "=================================================="
          echo "Verifying pytest-cov installation..."
          echo "=================================================="
          if ! python3 -c "import pytest_cov" 2>/dev/null; then
            echo "❌ ERROR: pytest-cov not found in Python environment"
            echo "Available packages:"
            pip list | grep -i pytest || true
            exit 1
          fi
          echo "✓ pytest-cov is available"
          
          # Determine pytest command based on matrix test-part
          echo "=================================================="
          echo "DEBUG: Determining test configuration"
          echo "  Matrix test-part raw: '${{ matrix.test-part }}'"
          echo "  TEST_PART variable: '${TEST_PART}'"
          echo "  TEST_PART length: ${#TEST_PART}"
          echo "  TEST_PART hex dump: $(echo -n "${TEST_PART}" | od -A n -t x1)"
          echo "=================================================="
          
          # Use shell variable in case statement for proper matching
          case "${TEST_PART}" in
            unit)
              echo "✓ Matched: Running unit tests from tests/ directory"
              PYTEST_ARGS="tests/ -m \"$FAST_TEST_MARKERS\""
              ;;
            vulcan)
              echo "✓ Matched: Running tests from src/vulcan/tests/ directory"
              PYTEST_ARGS="src/vulcan/tests/ -m \"$FAST_TEST_MARKERS\""
              ;;
            integration)
              echo "✓ Matched: Running slow/integration tests from both directories"
              PYTEST_ARGS="tests/ src/vulcan/tests/ -m \"slow or integration\""
              ;;
            *)
              echo "❌ ERROR: Unknown test-part value: '${TEST_PART}'"
              echo "   Raw from matrix: '${{ matrix.test-part }}'"
              echo "   Valid options are: unit, vulcan, integration"
              echo "   Debugging info:"
              echo "     - Length: ${#TEST_PART}"
              echo "     - Hex dump: $(echo -n "${TEST_PART}" | od -A n -t x1)"
              exit 1
              ;;
          esac
          
          # Increased --max-worker-restart to 3 for better resilience
          # Timeout set to 35m to ensure completion before job timeout (40m)
          # Added per-test timeout (--timeout=300) to prevent individual test hangs
          # Use -n 2 workers for better parallelism
          # Changed to verbose mode (-vv) for better visibility into test execution
          # Added -o timeout_func_only=true to only timeout test functions, not fixtures
          TIMEOUT_MINUTES=35
          timeout ${TIMEOUT_MINUTES}m pytest --cov=src -vv \
            --tb=short \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=results/junit.xml \
            --timeout=300 \
            --timeout-method=thread \
            -n 2 \
            --dist=loadfile \
            --max-worker-restart=3 \
            -o timeout_func_only=true \
            --continue-on-collection-errors \
            $PYTEST_ARGS || EXIT_CODE=$?
          
          # Stop monitor
          kill $MONITOR_PID 2>/dev/null || true
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Tests failed with exit code: $EXIT_CODE"
            if [ $EXIT_CODE -eq 124 ]; then
              echo "⏱️  TIMEOUT: Test suite exceeded ${TIMEOUT_MINUTES} minute limit"
              echo "Check verbose output above to identify hanging test"
            fi
          fi
          
          # Force cleanup of any background processes
          for pid in $(pgrep -f "pytest"); do
            kill -9 "$pid" 2>/dev/null || true
          done
          for pid in $(pgrep -f "python.*test"); do
            kill -9 "$pid" 2>/dev/null || true
          done
          
          exit $EXIT_CODE

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}-${{ matrix.test-part }}
          path: |
            results/
            htmlcov/
            coverage.xml
            logs/
          retention-days: 30

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Create buildkit config with retry settings
        run: |
          mkdir -p /tmp/buildkit
          cat > /tmp/buildkit/buildkitd.toml << 'EOF'
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]
          [registry."registry-1.docker.io"]
            mirrors = ["mirror.gcr.io"]
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config: /tmp/buildkit/buildkitd.toml

      - name: Install Docker Compose plugin
        run: |
          # Docker Compose v2 is now included with Docker by default
          # Verify installation
          docker compose version

      - name: Start services
        run: |
          set -x
          docker compose -f docker-compose.dev.yml up -d redis postgres minio
          sleep 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -x
          for i in 1 2 3; do
            python -m pip install --no-cache-dir --upgrade pip && \
            pip install --no-cache-dir pytest pytest-asyncio requests numpy python-dotenv && \
            break || (echo "Retry $i/3: test dependencies install failed"; sleep $((i*10)))
          done
          for i in 1 2 3; do
            pip install --no-cache-dir -r requirements.txt && break || (echo "⚠️  Retry $i/3: requirements.txt install failed"; sleep $((i*10)))
          done || {
            echo "❌ WARNING: Some dependencies may have failed to install"
            echo "This may cause test failures. Check logs above for details."
          }

      - name: Run integration tests
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key-at-least-32-chars-long-for-testing' }}
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          MINIO_ENDPOINT: http://localhost:9000
          # Configure test mode to prevent hanging on missing services
          CI: 'true'
          SKIP_LOCAL_LLM: 'true'
          SKIP_OPENAI: 'true'
          REASONING_MOCK_MODE: 'true'
          ARENA_ENABLED: 'false'
          TOOL_MONITOR_ENABLED: 'false'
          # Disable Ray in tests to prevent hanging
          VULCAN_ENABLE_RAY: '0'
        run: |
          set -x
          mkdir -p $GITHUB_WORKSPACE/logs
          mkdir -p $GITHUB_WORKSPACE/results
          exit_code=0
          # Run specific integration test files if they exist
          if [ -d "tests/integration" ]; then
            # Run pytest and capture output to file without using pipe/tee
            # This prevents buffering issues that can cause hanging
            pytest tests/integration/ -v --timeout=300 --continue-on-collection-errors --junitxml=results/integration-junit.xml > $GITHUB_WORKSPACE/logs/integration-test-output.log 2>&1 || exit_code=$?
            
            # Display the log content to GitHub Actions console
            cat $GITHUB_WORKSPACE/logs/integration-test-output.log
            
            echo "PYTEST_EXIT=$exit_code" > $GITHUB_WORKSPACE/results/integration-exitcode.txt
          else
            echo "No integration tests directory found"
            echo "PYTEST_EXIT=0 (no tests)" > $GITHUB_WORKSPACE/results/integration-exitcode.txt
          fi
          echo "Integration test exit code: $exit_code"

      - name: Cleanup
        if: always()
        run: |
          set -x
          docker compose -f docker-compose.dev.yml down -v

      - name: Upload integration test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-logs
          path: |
            logs/
            results/
          retention-days: 30

  build-validation:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "=== Disk usage before cleanup ===" && df -h || true
          
          # Remove large pre-installed packages and toolchains
          echo "Removing large pre-installed packages..."
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          
          # Remove additional large directories to free up more space for Docker builds
          echo "Removing additional toolchains and caches..."
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/graalvm || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/lib/node_modules || true
          
          # Clear package manager caches
          echo "Clearing package manager caches..."
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          
          # Purge Python pip cache
          echo "Purging pip cache..."
          python -m pip cache purge 2>/dev/null || true
          
          # Remove common runner caches
          echo "Removing runner caches..."
          sudo rm -rf /home/runner/.cache/* || true
          sudo rm -rf /home/runner/.local/share/virtualenvs/* || true
          
          # Prune Docker aggressively
          echo "Pruning Docker system..."
          sudo docker system prune -af --volumes || true
          sudo docker builder prune -af || true
          
          echo "=== Disk usage after cleanup ===" && df -h || true
          echo "=== Available space on root ===" 
          df -h / | tail -1 | awk '{print "Available: " $4 " (" $5 " used)"}' || echo "Could not parse disk usage"

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Create buildkit config with retry settings
        run: |
          mkdir -p /tmp/buildkit
          cat > /tmp/buildkit/buildkitd.toml << 'EOF'
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]
          [registry."registry-1.docker.io"]
            mirrors = ["mirror.gcr.io"]
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config: /tmp/buildkit/buildkitd.toml

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vulcanami-llm:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REJECT_INSECURE_JWT=ack
          # Use pull: false to leverage buildkit config with mirror
          # This prevents TLS handshake timeout errors with Docker Hub
          pull: false
          # Keep layer caching enabled (no-cache: false) for faster builds
          no-cache: false

      - name: Test Docker image
        run: |
          set -x
          # Note: --shm-size and RAY_DISABLE_DOCKER_CPU_WARNING prevent Ray warnings
          # about /dev/shm and CPU detection in containers
          # Using 10g to match docker-compose.dev.yml (Ray recommends >= 30% of RAM)
          docker run --rm \
            --shm-size=10g \
            -e RAY_DISABLE_DOCKER_CPU_WARNING=1 \
            -e JWT_SECRET_KEY=$(openssl rand -base64 48) \
            -e BOOTSTRAP_KEY=$(openssl rand -base64 32) \
            vulcanami-llm:test \
            python --version

  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          set -x
          for i in 1 2 3; do
            pip install --no-cache-dir pip-audit && break || (echo "Retry $i/3: pip-audit install failed"; sleep $((i*10)))
          done

      - name: Check for vulnerabilities
        run: |
          pip-audit --desc -r requirements.txt || true

      - name: Check for outdated packages
        run: |
          pip list --outdated || true

  # ============================================================================
  # Performance Smoke Tests Job
  # ============================================================================
  perf-smoke:
    name: Performance Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    # Run on push to main/develop and PRs, but allow workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'pull_request'

    permissions:
      contents: read

    env:
      PYTHONPATH: ${{ github.workspace }}/src
      PYTHONUNBUFFERED: '1'
      # Performance test configuration (can be overridden)
      PERF_ITERATIONS: '100'
      PERF_CONCURRENCY_LEVELS: '10,25'
      PERF_MAX_RSS_GROWTH_MB: '50'
      PERF_MAX_SLOWDOWN_PCT: '20'
      PERF_MAX_P95_REGRESSION_PCT: '25'
      PERF_MAX_RPS_REGRESSION_PCT: '25'
      PERF_OUTPUT_DIR: 'perf'
      # Configure test mode to prevent hanging on missing services
      CI: 'true'
      SKIP_LOCAL_LLM: 'true'
      SKIP_OPENAI: 'true'
      REASONING_MOCK_MODE: 'true'
      ARENA_ENABLED: 'false'
      TOOL_MONITOR_ENABLED: 'false'
      # Disable Ray in tests to prevent hanging
      VULCAN_ENABLE_RAY: '0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          python -m pip cache purge || true
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          mkdir -p "$REPO_CERT_DIR/CAs"
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install perf-lite dependencies
        run: |
          set -x
          python -m pip install --no-cache-dir --upgrade pip setuptools wheel

          echo "=================================================="
          echo "Installing VULCAN as editable package with perf-lite deps..."
          echo "=================================================="
          pip install -e ".[perf-lite]"

          # Verify psutil is available (critical for memory tracking)
          python -c "import psutil; print(f'psutil {psutil.__version__} installed')"

          echo "=================================================="
          echo "Perf-lite dependencies installed successfully"
          echo "=================================================="

      - name: Verify VULCAN installation
        run: |
          echo "Verifying VULCAN package installation..."
          # Use --verify-only to prevent background services from starting
          # Use --skip-slow-checks to speed up verification in CI
          python scripts/verify_installation.py --critical-only --verify-only --skip-slow-checks || {
            echo "⚠ VULCAN installation verification had issues"
            echo "Performance tests will use mock components"
          }

      - name: Create output directories
        run: |
          mkdir -p perf
          mkdir -p logs

      - name: Run performance smoke tests
        id: perf_tests
        continue-on-error: true
        run: |
          set -o pipefail
          echo "=================================================="
          echo "Running Performance Smoke Tests"
          echo "=================================================="
          echo "Configuration:"
          echo "  PERF_ITERATIONS: $PERF_ITERATIONS"
          echo "  PERF_CONCURRENCY_LEVELS: $PERF_CONCURRENCY_LEVELS"
          echo "  PERF_MAX_RSS_GROWTH_MB: $PERF_MAX_RSS_GROWTH_MB"
          echo "  PERF_MAX_SLOWDOWN_PCT: $PERF_MAX_SLOWDOWN_PCT"
          echo ""

          # Run perf tests with pytest
          # Capture output to file without using pipe/tee to prevent buffering issues
          PERF_EXIT=0
          pytest tests/perf/ \
            -m "perf or boundedness" \
            -v \
            --timeout=300 \
            --tb=short \
            --junitxml=perf/perf-junit.xml \
            > logs/perf-test-output.log 2>&1 || PERF_EXIT=$?
          
          # Display the log content to GitHub Actions console
          cat logs/perf-test-output.log
          
          echo "perf_exit_code=$PERF_EXIT" >> $GITHUB_OUTPUT
          exit $PERF_EXIT

      - name: Run regression comparison
        if: always()
        continue-on-error: true
        run: |
          echo "=================================================="
          echo "Running Performance Regression Check"
          echo "=================================================="

          # Run comparison script (won't fail CI if no results yet)
          python scripts/compare_perf.py \
            --results perf/results.json \
            --baseline perf/baseline.json \
            --output perf/comparison.md \
            --no-fail \
            2>&1 | tee logs/perf-comparison.log || true

      - name: Generate performance summary
        if: always()
        run: |
          echo "### 🚀 Performance Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add test result status
          if [ "${{ steps.perf_tests.outputs.perf_exit_code }}" = "0" ]; then
            echo "**Status:** ✅ All performance tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ⚠️ Some performance tests failed (exit code: ${{ steps.perf_tests.outputs.perf_exit_code }})" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add configuration
          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Iterations: $PERF_ITERATIONS" >> $GITHUB_STEP_SUMMARY
          echo "- Concurrency levels: $PERF_CONCURRENCY_LEVELS" >> $GITHUB_STEP_SUMMARY
          echo "- Max RSS growth: ${PERF_MAX_RSS_GROWTH_MB}MB" >> $GITHUB_STEP_SUMMARY
          echo "- Max slowdown: ${PERF_MAX_SLOWDOWN_PCT}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Include comparison report if available
          if [ -f perf/comparison.md ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat perf/comparison.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-smoke-results-${{ github.run_number }}
          path: |
            perf/*.json
            perf/*.md
            perf/*.xml
            logs/perf-*.log
          retention-days: 30
          if-no-files-found: warn

      - name: Check test results
        if: always()
        run: |
          # Check if tests passed
          EXIT_CODE="${{ steps.perf_tests.outputs.perf_exit_code }}"
          if [ -z "$EXIT_CODE" ]; then
            EXIT_CODE="unknown"
          fi

          echo "Performance test exit code: $EXIT_CODE"

          # For now, we don't fail the workflow on perf test failures
          # to avoid blocking PRs during initial rollout
          if [ "$EXIT_CODE" != "0" ] && [ "$EXIT_CODE" != "unknown" ]; then
            echo "⚠️ Performance tests had failures - see artifacts for details"
            # Uncomment to fail CI on perf test failures:
            # exit 1
          fi
