name: CI - Test and Lint

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.10.11'
  POETRY_VERSION: '1.7.0'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -x
          for i in 1 2 3; do
            python -m pip install --no-cache-dir --upgrade pip && \
            pip install --no-cache-dir flake8 black isort mypy pylint bandit && \
            break || (echo "Retry $i/3: pip install failed"; sleep $((i*10)))
          done

      - name: Run Black (code formatting check)
        run: |
          black --check --diff src/ tests/ || true

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff src/ tests/ || true

      - name: Run Flake8 (style guide enforcement)
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Run Pylint (code quality check)
        timeout-minutes: 10
        run: |
          set -x
          # Skip installing heavy dependencies for linting - not needed
          # for i in 1 2 3; do
          #   pip install -r requirements.txt && break || (echo "Retry $i/3: requirements.txt install failed"; sleep $((i*10)))
          # done || true
          echo "Skipping heavy dependencies installation for linting"
          pylint src/ --exit-zero || true

      - name: Run Bandit (security linting)
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -ll || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10.11']

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          set -x
          sudo apt-get update
          for i in 1 2 3; do
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y libpq-dev && \
            break || (echo "Retry $i/3: apt-get install failed"; sleep $((i*10)))
          done

      - name: Install Python dependencies
        run: |
          set -x
          python -m pip install --no-cache-dir --upgrade pip setuptools wheel
          for i in 1 2 3; do
            pip install --no-cache-dir pytest pytest-cov pytest-asyncio pytest-timeout mock hypothesis faker numpy python-dotenv && \
            break || (echo "Retry $i/3: test dependencies install failed"; sleep $((i*10)))
          done
          for i in 1 2 3; do
            pip install --no-cache-dir -r requirements.txt && break || (echo "Retry $i/3: requirements.txt install failed, continuing..."; sleep $((i*10)))
          done || echo "Some dependencies may have failed, continuing..."

      - name: Set environment variables
        run: |
          echo "JWT_SECRET_KEY=$(openssl rand -base64 48)" >> $GITHUB_ENV
          echo "BOOTSTRAP_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_USER=test_user" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=test_password" >> $GITHUB_ENV
          echo "POSTGRES_DB=test_db" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}/src:$PYTHONPATH" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          set -x
          mkdir -p $GITHUB_WORKSPACE/results
          mkdir -p $GITHUB_WORKSPACE/logs
          exit_code=0
          ulimit -Sn 10240 || true
          pytest --cov=src -q \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=results/junit.xml \
            --timeout=300 \
            -v \
            2>&1 | tee $GITHUB_WORKSPACE/logs/pytest-output.log || exit_code=$?
          echo "PYTEST_EXIT=$exit_code" > $GITHUB_WORKSPACE/results/exitcode.txt
          echo "Test exit code: $exit_code"
          exit $exit_code

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            results/
            htmlcov/
            coverage.xml
            logs/
          retention-days: 30

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Install Docker Compose plugin
        run: |
          # Docker Compose v2 is now included with Docker by default
          # Verify installation
          docker compose version

      - name: Start services
        run: |
          set -x
          docker compose -f docker-compose.dev.yml up -d redis postgres minio
          sleep 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -x
          for i in 1 2 3; do
            python -m pip install --no-cache-dir --upgrade pip && \
            pip install --no-cache-dir pytest pytest-asyncio requests numpy python-dotenv && \
            break || (echo "Retry $i/3: test dependencies install failed"; sleep $((i*10)))
          done
          for i in 1 2 3; do
            pip install --no-cache-dir -r requirements.txt && break || (echo "Retry $i/3: requirements.txt install failed, continuing..."; sleep $((i*10)))
          done || echo "Continuing despite dependency issues..."

      - name: Run integration tests
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key-at-least-32-chars-long-for-testing' }}
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost
          MINIO_ENDPOINT: http://localhost:9000
        run: |
          set -x
          mkdir -p $GITHUB_WORKSPACE/logs
          mkdir -p $GITHUB_WORKSPACE/results
          exit_code=0
          # Run specific integration test files if they exist
          if [ -d "tests/integration" ]; then
            pytest tests/integration/ -v --timeout=300 --junitxml=results/integration-junit.xml 2>&1 | tee $GITHUB_WORKSPACE/logs/integration-test-output.log || exit_code=$?
            echo "PYTEST_EXIT=$exit_code" > $GITHUB_WORKSPACE/results/integration-exitcode.txt
          else
            echo "No integration tests directory found"
            echo "PYTEST_EXIT=0 (no tests)" > $GITHUB_WORKSPACE/results/integration-exitcode.txt
          fi
          echo "Integration test exit code: $exit_code"

      - name: Cleanup
        if: always()
        run: |
          set -x
          docker compose -f docker-compose.dev.yml down -v

      - name: Upload integration test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-logs
          path: |
            logs/
            results/
          retention-days: 30

  build-validation:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vulcanami-llm:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REJECT_INSECURE_JWT=ack
          pull: true

      - name: Test Docker image
        run: |
          set -x
          docker run --rm \
            -e JWT_SECRET_KEY=$(openssl rand -base64 48) \
            -e BOOTSTRAP_KEY=$(openssl rand -base64 32) \
            vulcanami-llm:test \
            python --version

  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Ensure cert directory readable
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure the path exists and is traversable/readable by the runner
          # Include CAs subdirectory to prevent scandir permission errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          # Give all users read and directories the execute bit (so runner can scandir)
          chmod -R a+rX "$REPO_CERT_DIR" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          set -x
          for i in 1 2 3; do
            pip install --no-cache-dir pip-audit && break || (echo "Retry $i/3: pip-audit install failed"; sleep $((i*10)))
          done

      - name: Check for vulnerabilities
        run: |
          pip-audit --desc -r requirements.txt || true

      - name: Check for outdated packages
        run: |
          pip list --outdated || true
