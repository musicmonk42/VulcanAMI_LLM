name: Deploy to Environments

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      version:
        description: 'Version/Tag to deploy'
        required: false
        default: 'latest'

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  determine-environment:
    name: Determine Target Environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.set-env.outputs.deploy }}

    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy-kubernetes:
    name: Deploy to Kubernetes (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
        continue-on-error: true

      - name: Check kubectl configuration
        id: kubectl-check
        run: |
          if kubectl cluster-info &> /dev/null; then
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ kubectl is configured and cluster is accessible"
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  kubectl is not configured or cluster is not accessible"
            echo "Deployment will be skipped"
          fi

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
          echo "Using version: ${{ steps.version.outputs.version }}"

      - name: Run pre-deployment validation
        if: steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          echo "Running pre-deployment validation for environment: $ENV"
          chmod +x scripts/validate-deployment.sh
          ./scripts/validate-deployment.sh $ENV || {
            echo "⚠️  Validation warnings detected, continuing with deployment..."
            echo "Review validation output above"
          }

      - name: Create or update secrets
        if: steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"
          
          # Create namespace if not exists
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          
          # Check if secrets exist
          if kubectl get secret vulcanami-secrets -n $NAMESPACE &> /dev/null; then
            echo "✅ Secrets already exist in namespace $NAMESPACE"
          else
            echo "Creating secrets in namespace $NAMESPACE"
            
            # Generate secrets using the script
            chmod +x scripts/generate-secrets.sh
            
            # Create secret with available GitHub secrets
            kubectl create secret generic vulcanami-secrets \
              --from-literal=JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY || 'REPLACE_WITH_ACTUAL_SECRET' }}" \
              --from-literal=BOOTSTRAP_KEY="${{ secrets.BOOTSTRAP_KEY || 'REPLACE_WITH_ACTUAL_SECRET' }}" \
              --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD || 'REPLACE_WITH_ACTUAL_SECRET' }}" \
              --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD || 'REPLACE_WITH_ACTUAL_SECRET' }}" \
              --from-literal=MINIO_ROOT_USER="minioadmin" \
              --from-literal=MINIO_ROOT_PASSWORD="${{ secrets.MINIO_ROOT_PASSWORD || 'REPLACE_WITH_ACTUAL_SECRET' }}" \
              --from-literal=MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY || 'REPLACE_WITH_ACTUAL_SECRET' }}" \
              --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY || '' }}" \
              --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY || '' }}" \
              --from-literal=GRAPHIX_API_KEY="${{ secrets.GRAPHIX_API_KEY || '' }}" \
              --from-literal=VULCAN_LLM_API_KEY="${{ secrets.VULCAN_LLM_API_KEY || secrets.OPENAI_API_KEY || '' }}" \
              --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID || 'minioadmin' }}" \
              --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY || 'REPLACE_WITH_ACTUAL_SECRET' }}" \
              -n $NAMESPACE \
              --dry-run=client -o yaml | kubectl apply -f -
            
            echo "✅ Secrets created"
          fi

      - name: Deploy with automated script
        if: steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          VERSION="${{ steps.version.outputs.version }}"
          
          echo "Deploying VulcanAMI to $ENV with version $VERSION"
          chmod +x scripts/deploy.sh
          
          # Use our deployment automation script
          ./scripts/deploy.sh $ENV \
            --image-tag "$VERSION" \
            --wait-timeout 600
        continue-on-error: false

      - name: Wait for all deployments and StatefulSets
        if: steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"
          
          echo "Waiting for all deployments to be ready..."
          
          # Wait for deployments
          for deployment in $(kubectl get deployments -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}'); do
            echo "Waiting for deployment: $deployment"
            kubectl rollout status deployment/$deployment -n $NAMESPACE --timeout=10m || {
              echo "❌ Deployment $deployment failed"
              kubectl describe deployment/$deployment -n $NAMESPACE
              kubectl logs -n $NAMESPACE -l app=$(kubectl get deployment/$deployment -n $NAMESPACE -o jsonpath='{.spec.selector.matchLabels.app}') --tail=50
              exit 1
            }
          done
          
          # Wait for StatefulSets
          for sts in $(kubectl get statefulsets -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo ""); do
            if [ -n "$sts" ]; then
              echo "Waiting for StatefulSet: $sts"
              kubectl rollout status statefulset/$sts -n $NAMESPACE --timeout=10m || {
                echo "❌ StatefulSet $sts failed"
                kubectl describe statefulset/$sts -n $NAMESPACE
                kubectl logs -n $NAMESPACE -l app=$(kubectl get statefulset/$sts -n $NAMESPACE -o jsonpath='{.spec.selector.matchLabels.app}') --tail=50
                exit 1
              }
            fi
          done
          
          echo "✅ All deployments and StatefulSets are ready"

      - name: Verify service health
        if: steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"
          
          echo "Running health checks..."
          
          # Check all pods are running
          echo "Checking pod status..."
          kubectl get pods -n $NAMESPACE
          
          UNHEALTHY_PODS=$(kubectl get pods -n $NAMESPACE --field-selector=status.phase!=Running,status.phase!=Succeeded -o jsonpath='{.items[*].metadata.name}')
          if [ -n "$UNHEALTHY_PODS" ]; then
            echo "⚠️  Unhealthy pods detected: $UNHEALTHY_PODS"
            for pod in $UNHEALTHY_PODS; do
              echo "Pod $pod status:"
              kubectl describe pod $pod -n $NAMESPACE
              echo "Pod $pod logs:"
              kubectl logs $pod -n $NAMESPACE --tail=50 || true
            done
          else
            echo "✅ All pods are healthy"
          fi
          
          # Test API health endpoint
          echo "Testing API health endpoint..."
          kubectl run curl-test-$RANDOM --image=curlimages/curl:latest --rm -i --restart=Never -n $NAMESPACE -- \
            curl -f -m 10 http://vulcanami-api.$NAMESPACE.svc.cluster.local:8000/health/live || {
            echo "⚠️  API health check failed, but deployment succeeded"
            exit 0
          }
          
          echo "✅ API health check passed"

      - name: Run post-deployment tests
        if: steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"
          
          echo "Running post-deployment connectivity tests..."
          
          # Test Milvus connectivity from API pod
          echo "Testing Milvus connectivity..."
          kubectl exec -n $NAMESPACE deploy/vulcanami-api -- \
            sh -c 'timeout 10 nc -zv milvus-service 19530' || {
            echo "⚠️  Milvus connectivity test failed"
          }
          
          # Test MinIO connectivity
          echo "Testing MinIO connectivity..."
          kubectl exec -n $NAMESPACE deploy/vulcanami-api -- \
            sh -c 'timeout 10 curl -f -m 5 http://minio-service:9000/minio/health/live' || {
            echo "⚠️  MinIO health check failed"
          }
          
          # Test PostgreSQL connectivity
          echo "Testing PostgreSQL connectivity..."
          kubectl exec -n $NAMESPACE deploy/vulcanami-api -- \
            sh -c 'timeout 10 nc -zv postgres-service 5432' || {
            echo "⚠️  PostgreSQL connectivity test failed"
          }
          
          # Test Redis connectivity
          echo "Testing Redis connectivity..."
          kubectl exec -n $NAMESPACE deploy/vulcanami-api -- \
            sh -c 'timeout 10 nc -zv redis-service 6379' || {
            echo "⚠️  Redis connectivity test failed"
          }
          
          echo "✅ Post-deployment tests completed"

      - name: Get deployment info
        if: always() && steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"

          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`$ENV\`" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** \`$NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📦 Pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE >> $GITHUB_STEP_SUMMARY || echo "Could not retrieve pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🌐 Services" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n $NAMESPACE >> $GITHUB_STEP_SUMMARY || echo "Could not retrieve services" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📊 Resource Usage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl top pods -n $NAMESPACE 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Metrics not available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get ingress info if available
          INGRESS_HOST=$(kubectl get ingress -n $NAMESPACE -o jsonpath='{.items[0].spec.rules[0].host}' 2>/dev/null || echo "")
          if [ -n "$INGRESS_HOST" ]; then
            echo "### 🔗 Access URL" >> $GITHUB_STEP_SUMMARY
            echo "https://$INGRESS_HOST" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### 📝 Quick Access Commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# View logs" >> $GITHUB_STEP_SUMMARY
          echo "kubectl logs -n $NAMESPACE -l app=vulcanami-api --tail=100 -f" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Port forward to API" >> $GITHUB_STEP_SUMMARY
          echo "kubectl port-forward -n $NAMESPACE svc/vulcanami-api 8000:8000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Get pod status" >> $GITHUB_STEP_SUMMARY
          echo "kubectl get pods -n $NAMESPACE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Report deployment failure
        if: failure() && steps.kubectl-check.outputs.configured == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"
          
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** $NAMESPACE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Failed Pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE --field-selector=status.phase!=Running,status.phase!=Succeeded >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Events" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' | tail -20 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy-helm:
    name: Deploy with Helm (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with Helm
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          VERSION="${{ steps.version.outputs.version }}"
          NAMESPACE="vulcanami-$ENV"

          if [ ! -d "helm/vulcanami" ]; then
            echo "Helm chart not found, skipping Helm deployment"
            exit 0
          fi

          # Create namespace
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          # Deploy or upgrade
          helm upgrade --install vulcanami ./helm/vulcanami \
            --namespace $NAMESPACE \
            --create-namespace \
            --set image.tag=$VERSION \
            --set environment=$ENV \
            --values helm/vulcanami/values-$ENV.yaml \
            --wait \
            --timeout 10m

      - name: Run Helm tests
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"

          if [ -d "helm/vulcanami" ]; then
            helm test vulcanami -n $NAMESPACE || echo "No Helm tests defined"
          fi

  deploy-docker-compose:
    name: Deploy with Docker Compose (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true' && needs.determine-environment.outputs.environment == 'development'
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/vulcanami || exit 1

            # Pull latest changes
            git pull origin develop

            # Create .env if not exists
            if [ ! -f .env ]; then
              cat > .env << 'EOF'
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            BOOTSTRAP_KEY=${{ secrets.BOOTSTRAP_KEY }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            MINIO_ROOT_USER=minioadmin
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_PASSWORD }}
            EOF
            fi

            # Pull and restart services
            docker compose -f docker-compose.dev.yml pull
            docker compose -f docker-compose.dev.yml up -d --remove-orphans

            # Check health
            sleep 30
            docker compose -f docker-compose.dev.yml ps

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [determine-environment, deploy-kubernetes, deploy-helm, deploy-docker-compose]
    if: always() && needs.determine-environment.outputs.deploy == 'true'

    steps:
      - name: Check for Slack webhook secret
        id: check-slack
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "has_slack_webhook=true" >> $GITHUB_OUTPUT
          else
            echo "has_slack_webhook=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: steps.check-slack.outputs.has_slack_webhook == 'true'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Deployment to ${{ needs.determine-environment.outputs.environment }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*\nEnvironment: `${{ needs.determine-environment.outputs.environment }}`\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create deployment summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.determine-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
