name: Deploy to Environments

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      version:
        description: 'Version/Tag to deploy'
        required: false
        default: 'latest'

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  determine-environment:
    name: Determine Target Environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.set-env.outputs.deploy }}

    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy-kubernetes:
    name: Deploy to Kubernetes (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Replace tokens in manifests
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          VERSION="${{ steps.version.outputs.version }}"

          if [ -d "k8s/overlays/$ENV" ]; then
            find k8s/overlays/$ENV -type f -name "*.yaml" -exec sed -i \
              -e "s|IMAGE_TAG|$VERSION|g" \
              -e "s|ENVIRONMENT|$ENV|g" {} \;
          fi

      - name: Create namespace if not exists
        run: |
          kubectl create namespace vulcanami-${{ needs.determine-environment.outputs.environment }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with kubectl
        run: |
          set -x
          ENV="${{ needs.determine-environment.outputs.environment }}"

          if [ -d "k8s/overlays/$ENV" ]; then
            kubectl apply -k k8s/overlays/$ENV
          elif [ -d "k8s/base" ]; then
            kubectl apply -k k8s/base
          else
            echo "No Kubernetes manifests found"
            exit 1
          fi

      - name: Wait for deployment
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"

          kubectl rollout status deployment/vulcanami-api -n $NAMESPACE --timeout=5m
          kubectl rollout status deployment/vulcanami-dqs -n $NAMESPACE --timeout=5m || true
          kubectl rollout status deployment/vulcanami-pii -n $NAMESPACE --timeout=5m || true

      - name: Run smoke tests
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"

          # Get service endpoint
          API_ENDPOINT=$(kubectl get svc vulcanami-api -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "localhost")

          # Simple health check
          echo "Testing health endpoint..."
          kubectl run curl-test --image=curlimages/curl:latest --rm -i --restart=Never -- \
            curl -f http://vulcanami-api.$NAMESPACE.svc.cluster.local:8000/health || true

      - name: Get deployment info
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"

          echo "## Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "Environment: $ENV" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods:" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services:" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n $NAMESPACE >> $GITHUB_STEP_SUMMARY || true

  deploy-helm:
    name: Deploy with Helm (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with Helm
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          VERSION="${{ steps.version.outputs.version }}"
          NAMESPACE="vulcanami-$ENV"

          if [ ! -d "helm/vulcanami" ]; then
            echo "Helm chart not found, skipping Helm deployment"
            exit 0
          fi

          # Create namespace
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          # Deploy or upgrade
          helm upgrade --install vulcanami ./helm/vulcanami \
            --namespace $NAMESPACE \
            --create-namespace \
            --set image.tag=$VERSION \
            --set environment=$ENV \
            --values helm/vulcanami/values-$ENV.yaml \
            --wait \
            --timeout 10m

      - name: Run Helm tests
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          NAMESPACE="vulcanami-$ENV"

          if [ -d "helm/vulcanami" ]; then
            helm test vulcanami -n $NAMESPACE || echo "No Helm tests defined"
          fi

  deploy-docker-compose:
    name: Deploy with Docker Compose (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true' && needs.determine-environment.outputs.environment == 'development'
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/vulcanami || exit 1

            # Pull latest changes
            git pull origin develop

            # Create .env if not exists
            if [ ! -f .env ]; then
              cat > .env << 'EOF'
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            BOOTSTRAP_KEY=${{ secrets.BOOTSTRAP_KEY }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            MINIO_ROOT_USER=minioadmin
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_PASSWORD }}
            EOF
            fi

            # Pull and restart services
            docker compose -f docker-compose.dev.yml pull
            docker compose -f docker-compose.dev.yml up -d --remove-orphans

            # Check health
            sleep 30
            docker compose -f docker-compose.dev.yml ps

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [determine-environment, deploy-kubernetes, deploy-helm, deploy-docker-compose]
    if: always() && needs.determine-environment.outputs.deploy == 'true'

    steps:
      - name: Check for Slack webhook secret
        id: check-slack
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "has_slack_webhook=true" >> $GITHUB_OUTPUT
          else
            echo "has_slack_webhook=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: steps.check-slack.outputs.has_slack_webhook == 'true'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Deployment to ${{ needs.determine-environment.outputs.environment }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*\nEnvironment: `${{ needs.determine-environment.outputs.environment }}`\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create deployment summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.determine-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
