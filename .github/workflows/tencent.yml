# This workflow will build a docker container, publish and deploy it to Tencent Kubernetes Engine (TKE) when there is a push to the "main" branch.
#
# To configure this workflow:
#
# 1. Ensure that your repository contains the necessary configuration for your Tencent Kubernetes Engine cluster,
#    including deployment.yml, kustomization.yml, service.yml, etc.
#
# 2. Set up secrets in your workspace:
#    - TENCENT_CLOUD_SECRET_ID with Tencent Cloud secret id
#    - TENCENT_CLOUD_SECRET_KEY with Tencent Cloud secret key
#    - TENCENT_CLOUD_ACCOUNT_ID with Tencent Cloud account id
#    - TKE_REGISTRY_PASSWORD with TKE registry password
#
# 3. Change the values for the TKE_IMAGE_URL, TKE_REGION, TKE_CLUSTER_ID and DEPLOYMENT_NAME environment variables (below).

name: Tencent Kubernetes Engine

on:
  push:
    branches: [ "main" ]

# Environment variables available to all jobs and steps in this workflow
env:
  TKE_IMAGE_URL: ccr.ccs.tencentyun.com/demo/mywebapp
  TKE_REGION: ap-guangzhou
  TKE_CLUSTER_ID: cls-mywebapp
  DEPLOYMENT_NAME: tke-test

permissions:
  contents: read

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Check for Tencent secrets
      id: check-secrets
      run: |
        if [ -n "${{ secrets.TENCENT_CLOUD_ACCOUNT_ID }}" ] && [ -n "${{ secrets.TKE_REGISTRY_PASSWORD }}" ]; then
          echo "has_basic_secrets=true" >> $GITHUB_OUTPUT
        else
          echo "has_basic_secrets=false" >> $GITHUB_OUTPUT
        fi
        
        if [ -n "${{ secrets.TENCENT_CLOUD_ACCOUNT_ID }}" ] && [ -n "${{ secrets.TKE_REGISTRY_PASSWORD }}" ] && [ -n "${{ secrets.TENCENT_CLOUD_SECRET_ID }}" ] && [ -n "${{ secrets.TENCENT_CLOUD_SECRET_KEY }}" ]; then
          echo "has_all_secrets=true" >> $GITHUB_OUTPUT
        else
          echo "has_all_secrets=false" >> $GITHUB_OUTPUT
        fi

    - name: Free up runner disk space
      run: |
        set -euo pipefail
        echo "Disk usage before cleanup:" && df -h || true
        # Remove large pre-installed packages
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
        sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
        # Clear apt cache and package lists
        sudo apt-get clean || true
        sudo rm -rf /var/lib/apt/lists/* || true
        # Purge pip cache
        python -m pip cache purge || true
        # Remove common runner caches that may be large
        sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
        # Prune Docker images / containers / volumes
        sudo docker system prune -af --volumes || true
        echo "Disk usage after cleanup:" && df -h || true

    # Build
    - name: Build Docker image
      run: |
        docker build --build-arg REJECT_INSECURE_JWT=ack -t ${TKE_IMAGE_URL}:${GITHUB_SHA} .

    - name: Login TKE Registry
      if: steps.check-secrets.outputs.has_basic_secrets == 'true'
      run: |
        docker login -u ${{ secrets.TENCENT_CLOUD_ACCOUNT_ID }} -p '${{ secrets.TKE_REGISTRY_PASSWORD }}' ${TKE_IMAGE_URL}

    # Push the Docker image to TKE Registry
    - name: Publish
      if: steps.check-secrets.outputs.has_basic_secrets == 'true'
      run: |
        docker push ${TKE_IMAGE_URL}:${GITHUB_SHA}

    - name: Set up Kustomize
      if: steps.check-secrets.outputs.has_all_secrets == 'true'
      run: |
        curl -o kustomize --location https://github.com/kubernetes-sigs/kustomize/releases/download/v3.1.0/kustomize_3.1.0_linux_amd64
        chmod u+x ./kustomize

    - name: Set up ~/.kube/config for connecting TKE cluster
      if: steps.check-secrets.outputs.has_all_secrets == 'true'
      uses: TencentCloud/tke-cluster-credential-action@v1
      with:
        secret_id: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
        secret_key: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        tke_region: ${{ env.TKE_REGION }}
        cluster_id: ${{ env.TKE_CLUSTER_ID }}

    - name: Switch to TKE context
      if: steps.check-secrets.outputs.has_all_secrets == 'true'
      run: |
        kubectl config use-context ${TKE_CLUSTER_ID}-context-default

    # Deploy the Docker image to the TKE cluster
    - name: Deploy
      if: steps.check-secrets.outputs.has_all_secrets == 'true'
      run: |
        ./kustomize edit set image ${TKE_IMAGE_URL}:${GITHUB_SHA}
        ./kustomize build . | kubectl apply -f -
        kubectl rollout status deployment/${DEPLOYMENT_NAME}
        kubectl get services -o wide
