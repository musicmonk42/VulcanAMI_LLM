name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Generate changelog since previous tag
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save to file
          cat > CHANGELOG.md << EOF
          # Release ${{ steps.version.outputs.version }}

          ## Changes
          $CHANGELOG

          ## Docker Images
          \`\`\`
          docker pull ghcr.io/${{ github.repository }}-main:${{ steps.version.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}-api:${{ steps.version.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}-dqs:${{ steps.version.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}-pii:${{ steps.version.outputs.version }}
          \`\`\`
          EOF

          echo "changelog_file=CHANGELOG.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.changelog_file }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Build Python package
        run: |
          set -x
          for i in 1 2 3; do
            pip install --no-cache-dir build twine && break || (echo "Retry $i/3: build tools install failed"; sleep $((i*10)))
          done
          python -m build

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czf vulcanami-${VERSION}-source.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='node_modules' \
            .

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            vulcanami-*-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-artifacts
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Free up runner disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:" && df -h || true
          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clear apt cache and package lists
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Purge pip cache
          python -m pip cache purge || true
          # Remove common runner caches that may be large
          sudo rm -rf /home/runner/.cache/* /home/runner/.local/share/virtualenvs/* || true
          # Prune Docker images / containers / volumes
          sudo docker system prune -af --volumes || true
          echo "Disk usage after cleanup:" && df -h || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Build package
        run: |
          set -x
          for i in 1 2 3; do
            pip install --no-cache-dir build && break || (echo "Retry $i/3: build tool install failed"; sleep $((i*10)))
          done
          python -m build

      - name: Publish to PyPI
        if: secrets.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [create-release, build-artifacts]
    if: always()

    steps:
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "New Release: v${{ steps.version.outputs.version }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *New Release Published*\n\nVersion: `v${{ steps.version.outputs.version }}`\nRepository: ${{ github.repository }}\n<${{ github.event.release.html_url }}|View Release>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
