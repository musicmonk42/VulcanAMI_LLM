name: Docker Build and Push

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to registry'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: main
            dockerfile: Dockerfile
            context: .
          - name: dqs
            dockerfile: docker/dqs/Dockerfile
            context: .
          - name: pii
            dockerfile: docker/pii/Dockerfile
            context: .
          - name: api
            dockerfile: docker/api/Dockerfile
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Free up disk space
        run: |
          set -euo pipefail
          echo "=== Disk space before cleanup ==="
          df -h
          echo "=== Removing unnecessary files to free up disk space ==="
          # Remove large pre-installed software
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/hostedtoolcache/* || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/az_* || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/local/graalvm || true
          sudo rm -rf /usr/local/sqlpackage || true
          # Clean package manager caches
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Clean temporary directories
          sudo rm -rf /tmp/* || true
          sudo rm -rf /var/tmp/* || true
          sudo rm -rf ~/.cache/* || true
          sudo rm -rf /var/cache/* || true
          # Clean npm and other language caches
          sudo rm -rf /usr/local/share/npm-global || true
          sudo rm -rf ~/.npm || true
          sudo rm -rf ~/.nvm || true
          # Docker cleanup - aggressive
          echo "=== Cleaning Docker resources ==="
          sudo docker system prune -af --volumes || true
          sudo docker image prune -af || true
          sudo docker container prune -f || true
          sudo docker volume prune -f || true
          sudo docker network prune -f || true
          sudo docker builder prune -af || true
          # Remove Docker build cache directory
          sudo rm -rf /var/lib/docker/overlay2/* || true
          # Restart Docker to clear any in-memory caches
          sudo systemctl restart docker || true
          sleep 5
          echo "=== Disk space after cleanup ==="
          df -h
          # Verify we have sufficient space
          # Multi-platform builds need ~15GB, single-platform needs ~10GB
          AVAILABLE_GB=$(df / | tail -1 | awk '{print int($4/1024/1024)}')
          echo "Available space: ${AVAILABLE_GB}GB"
          if [ "$AVAILABLE_GB" -lt 15 ]; then
            echo "WARNING: Less than 15GB available. Multi-platform builds may require additional cleanup."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-flags: --debug

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for DockerHub credentials secret
        id: check-dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "has_dockerhub_creds=true" >> $GITHUB_OUTPUT
          else
            echo "has_dockerhub_creds=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub (optional)
        if: github.event_name != 'pull_request' && steps.check-dockerhub.outputs.has_dockerhub_creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service.name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vulcanami-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Check if Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f "${{ matrix.service.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Warning: Dockerfile ${{ matrix.service.dockerfile }} not found"
          fi

      - name: Pre-build disk check
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: |
          echo "=== Pre-build disk status ==="
          df -h
          AVAILABLE_GB=$(df / | tail -1 | awk '{print int($4/1024/1024)}')
          echo "Available space: ${AVAILABLE_GB}GB"
          if [ "$AVAILABLE_GB" -lt 15 ]; then
            echo "ERROR: Insufficient disk space for Docker build"
            echo "Required: 15GB for multi-platform, 10GB for single-platform"
            echo "Available: ${AVAILABLE_GB}GB"
            exit 1
          fi

      - name: Determine build platforms
        id: platforms
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            echo "Building multi-platform image for release"
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
            echo "Building single-platform image to conserve disk space"
          fi

      - name: Build and push Docker image
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' || github.event.inputs.push_to_registry == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # Use max cache mode for optimal layer caching and faster builds
          # Despite larger cache size, this reduces overall disk usage by avoiding full rebuilds
          cache-to: type=gha,mode=max
          build-args: |
            REJECT_INSECURE_JWT=ack
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
          no-cache: false
          pull: true

      - name: Post-build disk check
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: |
          echo "=== Post-build disk status ==="
          df -h
          echo "=== Docker system disk usage ==="
          docker system df || true

      - name: Generate SBOM
        if: steps.check_dockerfile.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service.name }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom-${{ matrix.service.name }}.spdx.json

      - name: Upload SBOM
        if: steps.check_dockerfile.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service.name }}
          path: sbom-${{ matrix.service.name }}.spdx.json
          retention-days: 90

  scan-images:
    name: Security Scan Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-and-push
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        service: [main, dqs, pii, api]

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'

      - name: Check for Trivy SARIF file
        id: check_trivy_sarif
        run: |
          if [ -f "trivy-results-${{ matrix.service }}.sarif" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: steps.check_trivy_sarif.outputs.exists == 'true'
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: trivy-${{ matrix.service }}

  build-docker-compose:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Free up disk space
        run: |
          set -euo pipefail
          echo "=== Disk space before cleanup ==="
          df -h
          echo "=== Removing unnecessary files to free up disk space ==="
          # Remove large pre-installed software
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/hostedtoolcache/* || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/az_* || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/local/graalvm || true
          sudo rm -rf /usr/local/sqlpackage || true
          # Clean package manager caches
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          # Clean temporary directories
          sudo rm -rf /tmp/* || true
          sudo rm -rf /var/tmp/* || true
          sudo rm -rf ~/.cache/* || true
          sudo rm -rf /var/cache/* || true
          # Clean npm and other language caches
          sudo rm -rf /usr/local/share/npm-global || true
          sudo rm -rf ~/.npm || true
          sudo rm -rf ~/.nvm || true
          # Docker cleanup - aggressive
          echo "=== Cleaning Docker resources ==="
          sudo docker system prune -af --volumes || true
          sudo docker image prune -af || true
          sudo docker container prune -f || true
          sudo docker volume prune -f || true
          sudo docker network prune -f || true
          sudo docker builder prune -af || true
          # Remove Docker build cache directory
          sudo rm -rf /var/lib/docker/overlay2/* || true
          # Restart Docker to clear any in-memory caches
          sudo systemctl restart docker || true
          sleep 5
          echo "=== Disk space after cleanup ==="
          df -h
          # Verify we have sufficient space
          # Docker Compose builds typically need ~10-15GB
          AVAILABLE_GB=$(df / | tail -1 | awk '{print int($4/1024/1024)}')
          echo "Available space: ${AVAILABLE_GB}GB"
          if [ "$AVAILABLE_GB" -lt 15 ]; then
            echo "WARNING: Less than 15GB available. Build may require additional cleanup."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-flags: --debug

      - name: Create .env file
        run: |
          cat > .env << EOF
          JWT_SECRET_KEY=$(openssl rand -base64 48)
          BOOTSTRAP_KEY=$(openssl rand -base64 32)
          POSTGRES_PASSWORD=$(openssl rand -base64 32)
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=$(openssl rand -base64 24)
          REDIS_PASSWORD=$(openssl rand -base64 32)
          GRAFANA_PASSWORD=$(openssl rand -base64 16)
          EOF

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.dev.yml config > /dev/null
          if [ -f "docker-compose.prod.yml" ]; then
            docker compose -f docker-compose.prod.yml config > /dev/null
          fi

      - name: Test docker-compose build
        run: |
          set -x
          # Build only the main services without starting
          docker compose -f docker-compose.dev.yml build --parallel || echo "Some services may not have build configs"

  push-to-registries:
    name: Push to Multiple Registries
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-and-push, scan-images]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for DockerHub credentials secret
        id: check-dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "has_dockerhub_creds=true" >> $GITHUB_OUTPUT
          else
            echo "has_dockerhub_creds=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check-dockerhub.outputs.has_dockerhub_creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check for AWS credentials secret
        id: check-aws
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "has_aws_creds=true" >> $GITHUB_OUTPUT
          else
            echo "has_aws_creds=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to AWS ECR (optional)
        if: steps.check-aws.outputs.has_aws_creds == 'true'
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Tag and push release images
        run: |
          set -x
          VERSION=${{ steps.version.outputs.version }}

          # Pull from GitHub Container Registry
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-main:latest

          # Tag for different registries
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-main:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-main:${VERSION}

          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-main:latest \
              ${{ secrets.DOCKERHUB_USERNAME }}/vulcanami-main:${VERSION}
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/vulcanami-main:${VERSION}
          fi

          # Push versioned tag
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-main:${VERSION}
