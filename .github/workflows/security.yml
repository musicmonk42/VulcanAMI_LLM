name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
        continue-on-error: true

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install pip-audit
        run: |
          set -x
          for i in 1 2 3; do
            pip install pip-audit && break || (echo "Retry $i/3: pip-audit install failed"; sleep $((i*10)))
          done

      - name: Run pip-audit
        run: |
          pip-audit --desc --format json --output pip-audit-report.json -r requirements.txt || true
          pip-audit --desc -r requirements.txt || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

      - name: Run Safety check
        run: |
          set -x
          for i in 1 2 3; do
            pip install safety && break || (echo "Retry $i/3: safety install failed"; sleep $((i*10)))
          done
          safety check --json --output safety-report.json -r requirements.txt || true
          safety check -r requirements.txt || true

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 30

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # supply explicit commit range when running on PRs to avoid BASE==HEAD failure
          extra_args: >-
            --debug
            --only-verified
            ${{ github.event.pull_request.base.sha && format('--since-commit {0} --branch {1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || '' }}
        continue-on-error: true

      - name: GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  sast-scan:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install Bandit
        run: |
          set -x
          for i in 1 2 3; do
            python -m pip install --upgrade pip && \
            python -m pip install 'bandit==1.4.0' && \
            break || (echo "Retry $i/3: bandit install failed"; sleep $((i*10)))
          done

      - name: Run Bandit
        run: |
          # Run Bandit using the .bandit configuration file
          # This handles known plugin issues and noisy checks
          bandit -r src/ \
            -f json \
            -o bandit-report.json \
            -c .bandit || true

          # Also generate human-readable output for review
          bandit -r src/ -c .bandit -f txt || true
        env:
          PYTHONUNBUFFERED: 1

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: bandit-report.json
          retention-days: 30

      - name: Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/flask
            p/docker
            p/kubernetes
        continue-on-error: true

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          echo "Removing unnecessary files to free up disk space..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo docker system prune -af || true
          sudo docker image prune -af || true
          sudo rm -rf /opt/hostedtoolcache/* || true
          sudo apt-get clean || true
          sudo rm -rf /tmp/* || true
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with caching
        id: docker_build
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          push: false
          load: true
          tags: vulcanami-llm:scan
          build-args: |
            REJECT_INSECURE_JWT=ack
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Run Trivy vulnerability scanner
        if: steps.docker_build.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulcanami-llm:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Check for Trivy SARIF file
        id: check_trivy_sarif
        if: steps.docker_build.outcome == 'success'
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: steps.docker_build.outcome == 'success' && steps.check_trivy_sarif.outputs.exists == 'true'
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Run Grype vulnerability scanner
        if: steps.docker_build.outcome == 'success'
        uses: anchore/scan-action@v3
        with:
          image: 'vulcanami-llm:scan'
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
        continue-on-error: true

  infrastructure-scan:
    name: Infrastructure as Code Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,kubernetes,terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif
        continue-on-error: true

      - name: Scan Kubernetes manifests with Kubesec
        run: |
          if [ -d "k8s" ]; then
            wget https://github.com/controlplaneio/kubesec/releases/download/v2.13.0/kubesec_linux_amd64.tar.gz
            tar -xzf kubesec_linux_amd64.tar.gz
            for file in k8s/*.yaml k8s/**/*.yaml; do
              if [ -f "$file" ]; then
                echo "Scanning $file"
                ./kubesec scan "$file" || true
              fi
            done
          else
            echo "No k8s directory found"
          fi

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix repo permissions (make certs readable)
        if: always()
        run: |
          REPO_CERT_DIR="${{ github.workspace }}/configs/minio/certs"
          # Ensure CAs subdirectory exists to prevent scandir errors
          mkdir -p "$REPO_CERT_DIR/CAs"
          if [ -d "$REPO_CERT_DIR" ]; then
            echo "Fixing permissions for $REPO_CERT_DIR"
            find "$REPO_CERT_DIR" -type d -exec chmod 755 {} \; || true
            find "$REPO_CERT_DIR" -type f -exec chmod 644 {} \; || true
          else
            echo "$REPO_CERT_DIR not present, skipping"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.11'

      - name: Install dependencies
        run: |
          set -x
          for i in 1 2 3; do
            pip install pip-licenses && break || (echo "Retry $i/3: pip-licenses install failed"; sleep $((i*10)))
          done

      - name: Check licenses
        run: |
          set -x
          for i in 1 2 3; do
            pip install -r requirements.txt && break || (echo "Retry $i/3: requirements.txt install failed"; sleep $((i*10)))
          done || true
          pip-licenses --format=json --output-file=licenses.json || true
          pip-licenses --format=markdown --output-file=licenses.md || true
          pip-licenses || true

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report
          path: |
            licenses.json
            licenses.md
          retention-days: 90

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [codeql, dependency-scan, secret-scan, sast-scan, container-scan, infrastructure-scan]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scans Completed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CodeQL Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Scanning" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SAST Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Infrastructure as Code Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts Generated:" >> $GITHUB_STEP_SUMMARY
          ls -la || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the uploaded artifacts and GitHub Security tab for detailed results." >> $GITHUB_STEP_SUMMARY
