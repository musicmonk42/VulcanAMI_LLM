[pytest]
# --- Discovery & paths ---
pythonpath = .
testpaths = tests src/vulcan/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .venv __pycache__ .pytest_cache build dist *.egg-info archive

# --- Default options ---
# NOTE: Coverage is disabled by default for faster test runs.
# Enable coverage explicitly when needed: pytest --cov --cov-config=pyproject.toml --cov-report=term-missing
addopts =
    -v
    --tb=short
    --strict-markers
    --maxfail=0
    --continue-on-collection-errors
    --durations=50
    --durations-min=1.0

# NOTE:
# Coverage is disabled by default to improve test run performance.
# Run with coverage on demand:
#   pytest --cov --cov-config=pyproject.toml --cov-report=term-missing
#   pytest --cov --cov-config=pyproject.toml --cov-report=html

# --- Markers ---
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    load_test: marks tests as load tests
    benchmark: marks tests as benchmark tests (deselect with '-m "not benchmark"')
    requires_torch: marks tests requiring PyTorch
    perf: marks tests as performance tests (run with '-m perf')
    boundedness: marks tests as boundedness/leak detection tests

# --- Warnings control ---
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::ResourceWarning

# --- Hang diagnostics & timeouts ---
# If the session appears to “pause” after tests complete, this ensures that after
# 60 seconds Pytest dumps thread stacks so you can see what’s blocking shutdown.
faulthandler_timeout = 60

# Apply a reasonable timeout to *test functions only* (not teardown/fixtures).
# This prevents indefinite stalls while still allowing cleanups to finish.
#
# TIMEOUT CONFIGURATION (Industry Best Practice):
# - Default timeout: 120 seconds (sufficient for complex initialization tests)
# - Previous value of 30s caused SIGTERM (exit code 143) for tests that:
#   - Create UnifiedReasoner instances with multiple background threads
#   - Initialize ML components (embeddings, models)
#   - Perform complex teardown operations
#
# This timeout applies only to the test function itself (timeout_func_only=true),
# not to fixtures or teardown methods, allowing proper cleanup.
#
# For individual slow tests, use @pytest.mark.timeout(300) decorator.
# CI workflow can override this with --timeout=300 for longer integration tests.
timeout = 120
timeout_func_only = true
# Use thread-based timeout for xdist compatibility
timeout_method = thread

# --- Asyncio behavior (matches how you're running tests) ---
# Set asyncio_mode to auto instead of strict to handle both sync and async tests better
# This prevents event loop conflicts when running tests together
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
