[pytest]
# --- Discovery & paths ---
pythonpath = .
testpaths = tests src/vulcan/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .venv __pycache__ .pytest_cache build dist *.egg-info archive

# --- Default options ---
addopts =
    -v
    --tb=short
    --strict-markers
    --cov
    --cov-config=pyproject.toml
    --cov-report=term-missing

# NOTE:
# We intentionally DO NOT enable --cov-report=html by default because generating
# htmlcov can add noticeable post-run delay on large trees. Run it on demand:
#   pytest --cov --cov-config=pyproject.toml --cov-report=html

# --- Markers ---
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    load_test: marks tests as load tests
    benchmark: marks tests as benchmark tests (deselect with '-m "not benchmark"')

# --- Warnings control ---
filterwarnings =
    ignore::coverage.exceptions.CoverageWarning
    ignore::DeprecationWarning
    ignore::UserWarning

# --- Hang diagnostics & timeouts ---
# If the session appears to “pause” after tests complete, this ensures that after
# 60 seconds Pytest dumps thread stacks so you can see what’s blocking shutdown.
faulthandler_timeout = 60

# Apply a reasonable timeout to *test functions only* (not teardown/fixtures).
# This prevents indefinite stalls while still allowing cleanups to finish.
timeout = 120
timeout_func_only = true

# --- Asyncio behavior (matches how you're running tests) ---
# Keep strict mode to avoid implicit loop policies that can mask bugs.
asyncio_mode = strict
