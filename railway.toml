# =============================================================================
# Railway Deployment Configuration
# =============================================================================
# This file configures Railway to build and deploy the VulcanAMI application.
#
# WHAT GETS DEPLOYED:
# - Complete VulcanAMI platform via src/full_platform.py
# - VULCAN cognitive platform with /vulcan/v1/chat endpoint
# - Graphix Registry API
# - All 71+ integrated services
#
# IMPORTANT: The REJECT_INSECURE_JWT build argument is required to acknowledge
# that no insecure JWT secrets are embedded in the Docker image.
#
# REQUIRED ENVIRONMENT VARIABLES (set in Railway dashboard):
# - JWT_SECRET: Strong secret for JWT signing (min 32 chars)
#   Generate with: openssl rand -base64 48 | tr -d '+/'
#   OR use JWT_SECRET_KEY or GRAPHIX_JWT_SECRET
#   NOTE: Application will start in LIMITED MODE without JWT secret,
#         but authentication features will be disabled
# - OPENAI_API_KEY: For LLM chat features (required for full functionality)
#
# OPTIONAL ENVIRONMENT VARIABLES:
# - PORT: Server port (Railway sets this automatically)
# - LOG_LEVEL: Logging level (default: INFO)
# - ANTHROPIC_API_KEY: For Claude model support
# - GRAPHIX_API_KEY: For Graphix services
# - VULCAN_LLM_API_KEY: For self-improvement features (defaults to OPENAI_API_KEY)
# - DATABASE_URL: PostgreSQL connection string
# - REDIS_URL: Redis connection string
# - VULCAN_ENABLE_RAY: Set to '1' to force-enable Ray (not recommended on Railway)
#
# RAY DISTRIBUTED COMPUTING:
# Ray is automatically disabled on Railway due to limited /dev/shm (64MB).
# This is normal and the application will use subprocess execution instead.
# To force-enable Ray (may cause issues): VULCAN_ENABLE_RAY=1
#
# GIT PERSISTENCE (IMPORTANT FOR SELF-IMPROVEMENT):
# To prevent the "Groundhog Day" loop where self-improvement fixes are lost on
# container restart, you must enable Git persistence:
# 1. In Railway dashboard: Settings > Git > Enable "Railway Git Integration"
# 2. Set environment variable: VULCAN_GIT_PUSH_ENABLED=1
# 3. Configure Git credentials (Railway provides these automatically with Git Integration)
#
# Without Git persistence, any code fixes made by the self-improvement system
# will be lost when the container restarts or redeploys.
#
# DEBUGGING:
# - Check /vulcan/v1/llm/status endpoint to verify LLM configuration
# - Check /health/live for liveness (fast, used by Railway healthcheck)
# - Check /health/ready for readiness (checks service mounts)
# - Check /health for comprehensive platform health (all services)
# - Check Railway logs for startup messages about environment variables
# =============================================================================
[build]
# Use the main Dockerfile for building the full platform
builder = "dockerfile"
dockerfilePath = "Dockerfile"
buildArgs = ["REJECT_INSECURE_JWT=ack"]

[deploy]
# Health check configuration
# Using /health/live (liveness probe) instead of /health (comprehensive check)
# /health/live is a fast, lightweight endpoint that returns immediately once the
# FastAPI server is accepting HTTP requests, without waiting for all services
# to be fully initialized. This prevents healthcheck failures during the slow
# startup phase when ML models (spaCy, BERT, embeddings) are being loaded.
# For comprehensive health status, use the /health endpoint after startup.
healthcheckPath = "/health/live"
# CRITICAL: Set timeout high enough for Python/ML app startup
# Python apps with heavy imports (PyTorch, transformers, etc.) can take 2-4 minutes
# to start. Railway checks continuously during this window.
# Max allowed: 3600 seconds (1 hour), default: 300 seconds (5 minutes)
healthcheckTimeout = 600  # 10 minutes for ML model loading and cold start
# Restart policy
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Number of replicas (MUST be 1 to prevent split-brain/ghost process issues)
# Multiple replicas would cause inconsistent state and duplicate background tasks
# CRITICAL: Explicitly set to 1 - Railway may use different defaults
numReplicas = 1
