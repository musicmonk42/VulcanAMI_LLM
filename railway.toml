# =============================================================================
# Railway Deployment Configuration
# =============================================================================
# This file configures Railway to build and deploy the VulcanAMI application.
#
# WHAT GETS DEPLOYED:
# - Complete VulcanAMI platform via src/full_platform.py
# - VULCAN cognitive platform with /vulcan/v1/chat endpoint
# - Graphix Registry API
# - All 71+ integrated services
#
# IMPORTANT: The REJECT_INSECURE_JWT build argument is required to acknowledge
# that no insecure JWT secrets are embedded in the Docker image.
#
# REQUIRED ENVIRONMENT VARIABLES (set in Railway dashboard):
# - JWT_SECRET_KEY: Strong secret for JWT signing (min 32 chars)
# - OPENAI_API_KEY: For LLM chat features
#
# OPTIONAL ENVIRONMENT VARIABLES:
# - PORT: Server port (Railway sets this automatically)
# - LOG_LEVEL: Logging level (default: INFO)
# - ANTHROPIC_API_KEY: For Claude model support
# - GRAPHIX_API_KEY: For Graphix services
# - VULCAN_LLM_API_KEY: For self-improvement features (defaults to OPENAI_API_KEY)
# - DATABASE_URL: PostgreSQL connection string
# - REDIS_URL: Redis connection string
#
# GIT PERSISTENCE (IMPORTANT FOR SELF-IMPROVEMENT):
# To prevent the "Groundhog Day" loop where self-improvement fixes are lost on
# container restart, you must enable Git persistence:
# 1. In Railway dashboard: Settings > Git > Enable "Railway Git Integration"
# 2. Set environment variable: VULCAN_GIT_PUSH_ENABLED=1
# 3. Configure Git credentials (Railway provides these automatically with Git Integration)
#
# Without Git persistence, any code fixes made by the self-improvement system
# will be lost when the container restarts or redeploys.
#
# DEBUGGING:
# - Check /vulcan/v1/llm/status endpoint to verify LLM configuration
# - Check /health endpoint for overall platform health
# - Check Railway logs for startup messages about environment variables
# =============================================================================
[build]
# Use the main Dockerfile for building the full platform
builder = "dockerfile"
dockerfilePath = "Dockerfile"
buildArgs = ["REJECT_INSECURE_JWT=ack"]

[deploy]
# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 300  # Increased to 5 minutes for ML model loading
# Restart policy
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Number of replicas (MUST be 1 to prevent split-brain/ghost process issues)
# Multiple replicas would cause inconsistent state and duplicate background tasks
numReplicas = 1
